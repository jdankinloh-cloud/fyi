<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Dima.fyi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playball&display=swap" rel="stylesheet">
<style>
.loader-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999}
.loader{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;
  --border:#1a1a1a;--border2:#222;
  --text:#ededed;--text2:#888;--text3:#666;
  --glass:rgba(255,255,255,0.06);--glass2:rgba(255,255,255,0.08);
  --accent:#a78bfa;--green:#4ade80;--red:#f87171;
  --blur:blur(40px) saturate(180%);
  --radius:12px;--radius2:16px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}

.top-bar{padding:16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.top-bar h1{font-size:26px;font-weight:400;flex:1;font-family:'Playball',cursive;letter-spacing:0.5px}
.stats-pill{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);color:var(--text2)}

.search-bar{padding:0 16px 16px;position:relative;flex-shrink:0;display:flex;align-items:center}
.search-bar input{width:100%;padding:10px 14px 10px 38px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.search-bar input:focus{border-color:#fff}
.search-bar input::placeholder{color:#444}
.search-icon{position:absolute;left:28px;color:var(--text3);font-size:16px;display:flex;align-items:center;width:18px}
.search-icon svg{width:16px;height:16px;stroke:var(--text3);stroke-width:2;fill:none}

.tabs{padding:0 16px;flex-shrink:0}
.glass-tabs{display:flex;gap:0;border-bottom:1px solid #222;margin-bottom:16px}
.tab{flex:1;padding:10px 16px;text-align:center;font-size:13px;font-weight:500;color:#666;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:#fff;border-bottom-color:#fff}
.tab .badge{font-size:9px;padding:1px 5px;border-radius:8px;background:rgba(255,255,255,0.05);color:#fff;margin-left:3px}

.filter-row{padding:2px 0 16px 18px;display:flex;gap:8px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.chip{display:inline-block;padding:6px 14px;border-radius:6px;background:#111;border:1px solid var(--border2);font-size:12px;font-weight:500;color:#888;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.chip.active{background:#fff;color:#000;border-color:#fff}
.chip .cnt{margin-left:4px;opacity:.7}

.content{flex:1;overflow-y:auto;padding:0 16px 70px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.card{border-radius:var(--radius);overflow:hidden;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative;align-self:start}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,0.8) 100%);pointer-events:none;border-radius:0 0 var(--radius) var(--radius)}
.card:active{transform:scale(.97)}
.card:hover{border-color:#333}
.card-thumb{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:var(--radius) var(--radius) 0 0}
.card-thumb-bg{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:var(--radius) var(--radius) 0 0}
.card-body{padding:12px 14px;position:relative;z-index:1}
.card-title{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-cat{font-size:12px;color:var(--text3);margin-top:3px}
.card-source{font-size:9px;color:var(--text3);margin-top:2px;opacity:.7}
.card-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.card-badge.free{background:#0a2a1a;color:var(--green)}
.card-badge.paid{background:#1a0a2a;color:var(--accent)}
.card-badge.prem{background:rgba(248,113,113,0.15);color:var(--red)}
.card .card-badge{position:absolute;top:8px;right:8px;z-index:2}

.list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.list-item:active{opacity:.7}
.list-item-thumb{width:44px;height:44px;border-radius:8px;background:#111;flex-shrink:0}
.list-item-body{flex:1;min-width:0}
.list-item-title{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item-sub{font-size:12px;color:var(--text3);margin-top:2px}
.list-item-badge{padding:4px 10px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase}

.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,rgba(255,255,255,0.06) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-img{width:100%;aspect-ratio:16/10;display:flex;align-items:center;justify-content:center}
.skeleton-img::after{content:'';width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,.05)}
.skeleton-text{height:13px;border-radius:4px;margin-bottom:4px}
.skeleton-text.sm{width:60%;height:10px}

.img-wrapper{position:relative;overflow:hidden;border-radius:var(--radius)}
.img-wrapper img{transition:opacity .3s;border-radius:var(--radius);max-width:100%;height:auto;display:block}
.img-wrapper img.loading{opacity:0}
.img-wrapper .skeleton-overlay{position:absolute;inset:0;z-index:1;transition:opacity .3s;border-radius:var(--radius)}
.img-wrapper.loaded .skeleton-overlay{opacity:0;pointer-events:none}
.img-wrapper.error .skeleton-overlay{background:var(--bg3)}
.img-wrapper.error .error-icon{display:flex}
.img-wrapper .error-icon{display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:20px;color:var(--text3)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius2) var(--radius2) 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .25s ease;border:1px solid var(--border);border-bottom:none}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{padding:16px 20px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-header h2{font-size:16px;font-weight:700;flex:1}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--glass);border:1px solid var(--border);color:var(--text2);font-size:16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.modal-close:active{transform:scale(.9)}
.modal-body{padding:16px 20px 24px;overflow-y:auto;flex:1}
.modal-body img{max-width:100%;height:auto;display:block}
.modal-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.modal-meta .tag{padding:4px 10px;border-radius:10px;font-size:11px;font-weight:600;background:var(--glass);border:1px solid var(--border);color:var(--text2)}
.modal-prompt{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:12px;line-height:1.6;color:var(--text2);max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;font-family:'SF Mono',Consolas,monospace}

.btn-copy{width:100%;padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;position:relative;overflow:hidden;background:rgba(255,255,255,0.06);color:var(--text);border:1px solid rgba(255,255,255,0.1);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:inset 0 1px 0 rgba(255,255,255,0.1),0 2px 8px rgba(0,0,0,0.4)}
.btn-copy:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.15)}
.btn-copy:active{transform:scale(0.97)}
.btn-copy.primary{background:#fff;color:#000;border-color:#fff}
.btn-copy.primary:hover{background:#e0e0e0}
.btn-copy.secondary{background:var(--glass2);color:var(--text);border:1px solid var(--border)}
.btn-copy.secondary:active{transform:scale(.97)}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-row .btn-copy{flex:1;margin-top:0}
.btn-copy + .btn-copy{margin-top:6px}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:8px}
.empty-text{font-size:14px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--radius);background:rgba(255,255,255,0.1);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.toast.show{opacity:1}

.section-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 10px;padding-left:2px}

.bottom-bar{position:fixed;bottom:10px;left:0;right:0;padding:0 16px 8px;z-index:50;max-width:480px;margin:0 auto}
.tabbar{display:flex;align-items:center;justify-content:center;padding:6px;border-radius:28px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),inset 0 -1px 0 rgba(0,0,0,0.3),0 4px 24px rgba(0,0,0,0.5);position:relative;overflow:hidden}
.tabbar::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.06) 0%,transparent 100%);border-radius:28px 28px 0 0;pointer-events:none}
.tabbar .bt{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 4px;border-radius:22px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);cursor:pointer;transition:all .3s cubic-bezier(0.4,0,0.2,1);position:relative;z-index:1}
.tabbar .bt .bt-icon{display:flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(0.4,0,0.2,1)}
.tabbar .bt .bt-icon{pointer-events:none}
.tabbar .bt .bt-icon svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;pointer-events:none}
.tabbar .bt.active{color:#fff;background:rgba(255,255,255,0.1);box-shadow:inset 0 1px 0 rgba(255,255,255,0.12),inset 0 -1px 0 rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.3)}
.tabbar .bt.active::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,transparent 100%);border-radius:22px 22px 0 0;pointer-events:none}

.page{display:none;flex-direction:column;flex:1;overflow:hidden}
.page.active{display:flex}

.guide-feed{flex:1;overflow-y:auto;padding:0 16px 24px;-webkit-overflow-scrolling:touch}
.guide-feed::-webkit-scrollbar{width:3px}
.guide-feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.guide-card{border-radius:var(--radius2);overflow:hidden;background:var(--bg2);border:1px solid var(--border);margin-bottom:12px;cursor:pointer;transition:all .15s}
.guide-card:active{transform:scale(.98)}
.guide-card:hover{border-color:#333}
.guide-card-thumb{width:100%;aspect-ratio:16/9;object-fit:cover}
.guide-card-body{padding:14px 16px}
.guide-card-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:6px}
.guide-card-preview{font-size:12px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.guide-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.guide-card-tags .gtag{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;background:var(--glass);border:1px solid var(--border);color:var(--text2)}
.guide-card-tags .gtag.hot{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.2);color:var(--red)}
.guide-card-tags .gtag.live{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.2);color:var(--green)}
.guide-step{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.guide-step:last-child{border-bottom:none}
.guide-step-num{width:24px;height:24px;border-radius:50%;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0;margin-top:1px}
.guide-step-text{font-size:13px;line-height:1.6;color:var(--text2);flex:1}
.guide-step-text a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(167,139,250,0.3)}
.guide-step-text a:hover{border-bottom-color:var(--accent)}
.guide-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:60px 20px;text-align:center}
.guide-empty-icon{width:48px;height:48px;margin-bottom:16px;opacity:.25;color:var(--text2)}
.guide-empty-icon svg{width:48px;height:48px;stroke:currentColor;stroke-width:1.5;fill:none}
.guide-empty-title{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px}
.guide-empty-sub{font-size:12px;color:var(--text3);line-height:1.5}
</style>
</head>

ays behind all content. The video is fixed position, covers the entire viewport via object-cover, and sits at z-index: -10.\n\nVideo URL:\n\n\nhttps://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260403_054410_6b17f7f9-d11e-44f1-90b0-75ee563d1971.mp4\nAttributes: autoPlay, loop, muted, playsInline.\n\nFONTS:\n\nLoad \"Instrument Serif\" (regular + italic) from Google Fonts in index.html:\n\n\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap\" rel=\"stylesheet\">\nDefine a utility class .font-serif-display in index.css with font-family: 'Instrument Serif', serif;. Use this class for the brand name \"nexar\", the greeting \"Hey, Alex!\", and the \"Speak now to Nexar!\" heading.\n\nANIMATIONS:\n\nCustom fadeUp keyframe animation defined in index.css:\n\nFrom: opacity: 0; transform: translateY(24px)\nTo: opacity: 1; transform: translateY(0)\nTiming: 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards\nClass: .animate-fade-up (starts with opacity: 0)\nEach element has a staggered animationDelay via inline style prop, starting at 0s for the header and incrementing by ~0.05-0.1s per element (0s, 0.1s, 0.15s, 0.2s, 0.25s, 0.3s, 0.35s, 0.4s, 0.45s, 0.5s, 0.55s, 0.6s).\nLAYOUT:\n\nRoot container: min-h-screen relative p-4 sm:p-6 lg:p-8 overflow-x-hidden\nMax width wrapper: max-w-[1800px] mx-auto\nMain grid: flex flex-col lg:grid lg:grid-cols-12 gap-4 sm:gap-6 lg:gap-7\nLeft column: lg:col-span-3\nCenter column: lg:col-span-6 with inner width constrained to lg:w-[85%] xl:w-[85%] 2xl:w-[60%] centered\nRight column: lg:col-span-3\nHEADER (white pill bar):\n\nFull-width white rounded-full bar (bg-white rounded-full px-4 sm:px-6 py-2 sm:py-3 shadow-sm) containing:\n\nLeft: A 5x5/6x6 black rounded-md square with a 2x2 grid of tiny white rounded dots inside, followed by the word \"nexar\" in text-2xl sm:text-3xl font-serif-display\nCenter nav (hidden on mobile, hidden lg:flex): Links \"Workspace\" (active, black, font-medium), \"Actions\", \"Performance\", \"AI Insights\" (gray-500, hover gray-900)\nRight: A toggle pill (bg-gray-100 rounded-full) with \"Solo\" (inactive, gray) and \"Crew\" (active, bg-black text-white rounded-full) buttons, plus a black circle notification bell icon (filled white)\nSECTION HEADER ROW (below header):\n\nA row with border-b border-black/10 pb-4 sm:pb-6 mb-4 sm:mb-6 containing:\n\nLeft (col-span-3): Orange-red gradient circle avatar (bg-gradient-to-br from-red-400 to-orange-500) with white User icon inside, plus \"Hey, Alex!\" in text-[28px] sm:text-[36px] lg:text-[42px] font-serif-display\nCenter (col-span-6): \"Active Items\" text in text-[20px] sm:text-[24px] lg:text-[26px] tracking-[-0.04em]\nRight (col-span-3): \"Crew:\" label, 3 overlapping circular team member avatar images (-space-x-2), and \"+9\" counter\nTeam member avatar image URLs:\n\n\nhttps://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260403_075317_744395c6-7168-48c6-a1f6-5b9b7bd58f87.png&w=1280&q=85\n\nhttps://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260403_075333_2caea84e-742e-4846-9284-ed8532c44c99.png&w=1280&q=85\n\nhttps://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260403_075354_70a33cfd-3c9c-45ef-a7bb-d371cb8aa0af.png&w=1280&q=85\nLEFT COLUMN:\n\nProject Selector Pill: Light blue (bg-[#DBECFC]) rounded-full pill with a white circle containing a yellow X icon (two crossing lines, stroke #EAB308, strokeWidth 3.5), title \"Zenith Launch\", subtitle \"Product & Strategy\", and a ChevronDown icon.\n\nProductivity Score: Giant number \"85%\" in text-[80px] sm:text-[100px] lg:text-[120px] xl:text-[140px] tracking-[-0.04em] with \"Current efficiency\" subtitle below.\n\nSprint Metrics Card: Rounded card (rounded-[20px] sm:rounded-[28px]) with a background image:\n\n\nhttps://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260403_055416_630ff6c1-4b72-4cb6-a563-0c7e41124fe1.png&w=1280&q=85\n(cover, top center). Contains \"Sprint Metrics\" header with an \"Analytics\" pill badge, three stat columns: \"26h / Sessions\", \"11h / Standups\", \"6h / Audits\". Has an absolutely positioned white floating circle button at bottom center (-bottom-4 left-1/2 -translate-x-1/2) containing a pencil/edit SVG icon.\n\nCENTER COLUMN (3 TaskCards stacked vertically):\n\nCreate a reusable TaskCard component in src/components/TaskCard.tsx. It accepts props: icon (Lucide icon component), title, tagText, tagColor ('green'|'yellow'|'red'), details (array of {label, value}), bottomLeftContent (ReactNode), buttonText, buttonVariant ('dark'|'light'|'black'), buttonIcon (optional ReactNode).\n\nTaskCard layout: White rounded card (bg-white rounded-[20px] sm:rounded-[28px] px-4 sm:px-6 py-4 sm:py-5 shadow-sm) with 3 rows separated by border-b border-black/10:\n\nRow 1: Icon + title (left) and colored pill tag (right)\nRow 2: 3-column detail grid (label in gray-500, value in gray-900 font-medium). Third detail column is narrower (flex-[0.5] max-w-[120px]).\nRow 3: Custom bottom-left content + action button\nTag colors: green = bg-green-500 text-white, yellow = bg-yellow-400 text-gray-900, red = bg-red-500 text-white.\n\nButton variants: dark = bg-[#ECECEC] text-gray-900, black = bg-black text-white, light = bg-gray-100 text-gray-900.\n\nCard 1 - \"Sprint Planning Call\":\n\nIcon: Phone, Tag: \"Session\" (green)\nDetails: Time: \"Today: 10:00 AM\", With: \"Product & Growth\", Alert: \"15 min\"\nBottom: 3 overlapping avatar images + \"+7\" + \"Set to begin?\" text\nButton: \"Enter session\" (dark variant)\nNo rotation\nCard 2 - \"Layout Critique\":\n\nIcon: BarChart2, Tag: \"Action\" (yellow)\nDetails: Focus: \"Zenith Platform\", Details: \"Verify the layout of landing screen\", Due By: \"Mar 22\"\nBottom: \"Assignees:\" label + 2 overlapping avatar images\nButton: \"Let AI begin\" (black variant) with Sparkles icon\nRotated 2 degrees clockwise (rotate-[2deg])\nCard 3 - \"Zenith Crew Check\":\n\nIcon: Phone, Tag: \"Session\" (green)\nDetails: Time: \"Fri: 5:30 PM\", With: \"Sales Lead & Team\", Alert: \"10 min\"\nBottom: 3 overlapping avatar images + \"+5\" + \"Scheduled\" text\nButton: \"Show details\" (light variant)\nNo rotation\nRIGHT COLUMN:\n\nFast Commands List: Title row with star emoji in white circle + \"Fast commands\" heading (text-[20px] sm:text-[24px] lg:text-[26px] xl:text-[30px] tracking-[-0.04em]) + \"+ Add Item\" button. Three list items separated by border-t border-black/10, each with description text and a filled Play icon (Lucide Play with fill-gray-700):\n\n\"Review session notes and extract key discussion insights\"\n\"Generate PDF report with finished items from this week\"\n\"Update timeline view based on revised action items in sprint\"\nVoice Input Card: Light blue (bg-[#DBECFC]) rounded card with \"Audio Input\" blue pill badge (bg-blue-500 text-white), \"Speak now to Nexar!\" heading in font-serif-display, and a waveform visualization made of 35 thin vertical bars (w-0.5 bg-blue-400 rounded-full) with varying heights: [8, 16, 12, 28, 20, 36, 42, 24, 40, 16, 44, 32, 48, 28, 20, 36, 14, 32, 22, 40, 18, 30, 12, 26, 16, 34, 20, 38, 24, 28, 16, 22, 12, 20, 8] each multiplied by 0.8 for pixel height. Has a floating white circle microphone button at bottom center (same positioning as Sprint Metrics card).\n\nDEPENDENCIES:\n\nreact, react-dom (^18.3.1)\nlucide-react (^0.344.0) -- icons used: ChevronDown, User, ChevronRight, Mic, Phone, Bell, Play, BarChart2, Sparkles\n@supabase/Bolt Database-js (^2.57.4)\ntailwindcss (^3.4.1), postcss, autoprefixer\nVite (^5.4.2), @vitejs/plugin-react\nTypeScript\nVite config: Exclude lucide-react from optimizeDeps.\n\nTailwind config: Default with content scanning ./index.html and ./src/**/*.{js,ts,jsx,tsx}."},{"id":"neovision-landing","title":"NeoVision","category":"Landing Page","type":"landing-page","_free":false,"videoUrl":"https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_132809_d6ea910f-d700-44f7-afea-27d517487177.mp4","thumb":"https://motionsites.ai/assets/hero-neovision-poster-CIjls94N.png","prompt":"Build a modern, futuristic landing page using React + Vite + TypeScript + Tailwind CSS. Use lucide-react for icons. The page has 3 sections: a Hero, an About section, and an Insights section. The overall page background is black (bg-black). No custom fonts -- use the Tailwind default (system sans-serif).\n\nSECTION 1: HERO (full viewport height, light background)\n\nThe hero wrapper is a relative container. On mobile it has min-height: 100vh. On desktop (md: breakpoint) it has height: 100vh and min-height: auto. It has overflow: hidden.\n\nBackground layers (stacked with z-index):\n\nz-index 0: A solid background fill #FBFDFD covering the entire wrapper (absolute inset-0).\nz-index 1: A background video positioned absolute right-0 top-0 bottom-0. On mobile it is full width with opacity-30. On desktop it is w-[55%] with full opacity. The video element has object-cover object-top. The video URL is: https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_131232_feeda0b7-d00d-4bfa-a9d5-5d38648a4214.mp4 (autoPlay, loop, muted, playsInline). The video container and video both have a CSS class video-plus-darker with mix-blend-mode: normal !important.\nz-index 2: The content layer. This is a relative div with min-h-screen md:h-screen flex flex-col. It contains the Navbar and HeroSection.\n\nNavbar (inside content layer):\n\nrelative z-10, flex row, justify-between, padding px-5 py-4 md:px-12 md:py-6\nLeft side: Logo image (/image.png, height h-7 md:h-8), followed by hidden-on-mobile nav links: Home, About, Services, Contact. Links are text-sm text-neutral-500 hover:text-neutral-900. Gap between logo and links: gap-12.\nRight side: A search input (hidden on mobile, shown on desktop). Rounded-full, w-72, placeholder \"I am looking for...\", with a Search icon from lucide-react positioned absolute right inside. Border border-neutral-300, text text-neutral-600.\nMobile: A hamburger button (Menu icon from lucide-react) in a 40px circle with border-neutral-300. When toggled, a dropdown shows the nav links vertically and a full-width search input.\n\nHeroSection (inside content layer, flex-1):\n\nrelative z-10 flex-1 flex flex-col justify-between with padding px-5 pt-8 pb-20 md:px-12 md:pt-16 md:pb-36\nTop: Label \"Futuristic\" -- text-xs font-medium tracking-[0.3em] text-neutral-500 uppercase\nMain heading area: Flex row with a small \"05\" number on the left (text-sm text-neutral-400 mt-2 md:mt-4), then the heading: text-[2.75rem] md:text-[5.5rem] leading-[0.95] font-light tracking-tight text-neutral-900 reading \"NEW DIGITAL\" (line break) \"UNIVERSE\". Below the heading: a \"Get Started\" button (bg-neutral-900 text-white text-sm font-medium rounded, px-6 py-3 md:px-8 md:py-3.5) and a \"Contact Us\" text link.\nMiddle stat: \"47.2%\" with \"Reality\" label underneath. The stat group uses a custom CSS class hero-stat-group that on desktop has margin-right: 20% and justify-center. On mobile, margin-right: 0 and justify-start.\nBottom bar: Flex col on mobile, flex row on desktop with justify-between. Left side: \"Trusted by Clients\" label with 4 overlapping avatar circles (Pexels photos: 415829, 1222271, 1239291, 2379004 at w=100) using -space-x-2, each w-8 h-8 md:w-9 md:h-9 rounded-full border-2 border-neutral-100 object-cover, followed by \"20+\" text. Right side: A link icon (lucide Link) in a w-10 h-10 md:w-12 md:h-12 circle with border-neutral-300, next to a description paragraph \"In this futuristic realm, users can explore hyper-realistic virtual environments, interact with AI-driven avatars.\" (text-xs md:text-sm text-neutral-500 max-w-[200px] md:max-w-sm). This group uses custom class hero-description-group which on desktop has margin-right: 50%.\n\nDiagonal Section Divider (between Hero and About):\n\nThe SectionDivider is positioned absolute bottom-0 left-0 w-full with z-index: 3, inside the hero wrapper.\nContains an SVG with viewBox=\"0 0 1440 120\", preserveAspectRatio=\"none\", height h-[60px] md:h-[120px].\nThe SVG has a single polygon: points=\"0,0 0,120 1440,120 1440,80 920,80 680,0\" filled with #0F0F0F. This creates a diagonal cut from the left side going down to the black About section.\n\nSECTION 2: ABOUT (dark background #0F0F0F)\n\nFull-width section, backgroundColor: '#0F0F0F'\nTwo-column layout on desktop (lg:flex-row), stacked on mobile. Min-height 600px (lg: 700px).\nLeft column: A video that fills the space (object-cover mix-blend-lighten). Video URL: https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_132809_d6ea910f-d700-44f7-afea-27d517487177.mp4 (autoPlay, loop, muted, playsInline). On mobile the video area is h-[400px].\nRight column: Padding px-8 py-16 md:px-16 lg:px-20 xl:px-28, vertically centered content with max-width max-w-lg:\nLabel: \"About Us\" (text-xs font-medium tracking-[0.3em] text-neutral-500 uppercase, mb-8 md:mb-10)\nHeading: \"THE DIGITAL FRONTIER\" (text-4xl md:text-5xl lg:text-6xl xl:text-7xl font-light tracking-tight text-white leading-[1.05], mb-10 md:mb-12)\nThree pill tags: \"Digital\", \"Reality\", \"Next\" -- px-5 py-2 rounded-full border border-neutral-700 text-sm text-neutral-300 hover:border-neutral-500\nParagraph: \"Step into The Digital Frontier, where the boundaries between reality and virtual innovation disappear. This is the next era of immersive technology.\" (text-sm md:text-base text-neutral-400 leading-relaxed max-w-md)\nActions: \"Learn More\" button (bg-neutral-800 text-white text-sm font-medium rounded px-7 py-3.5 hover:bg-neutral-700) and a \"Watch a Video\" link with a Play icon (lucide Play) inside a w-10 h-10 bordered circle.\n\nSECTION 3: INSIGHTS (dark background #0F0F0F, tabbed content)\n\nSame backgroundColor: '#0F0F0F'. Padding px-8 md:px-16 lg:px-20 xl:px-28 pt-24 pb-32.\nLarge italic heading: \"LIMITLESS POSSIBILITIES WITH NEOVISION\" (text-4xl sm:text-5xl md:text-6xl lg:text-7xl xl:text-[5rem] font-light italic tracking-tight text-white leading-[1.05] max-w-5xl, mb-20 md:mb-28).\nBelow: a flex layout (col on mobile, row on desktop).\nLeft: Tab buttons (vertical list) for 3 tabs: \"Innovation\", \"Technology\", \"Experience\". Active tab is text-white font-medium, inactive is text-neutral-500 hover:text-neutral-300. Width lg:w-[160px] xl:w-[200px].\nRight: Content area with an image and text side by side on desktop.\nImage: lg:w-[420px] xl:w-[480px] aspect-[4/3] rounded-2xl overflow-hidden. Images are local files /Mask_group.jpg, /Mask_group-1.jpg, /Mask_group-2.jpg for the 3 tabs respectively.\nText side: Title (text-2xl md:text-3xl font-light text-white leading-snug max-w-sm), description (text-sm md:text-base text-neutral-400 leading-relaxed max-w-sm), \"Learn More\" underlined link (text-sm text-white font-medium underline underline-offset-4). At the bottom: date and author separated by a border-t border-neutral-800.\nTab data:\nInnovation: \"How VR is Transforming Our Digital World\" / \"Virtual Reality (VR) is no longer a concept of the future...\" / 08 February 2025 / Henry Leonardo\nTechnology: \"The Rise of Spatial Computing in Everyday Life\" / \"Spatial computing is bridging the gap...\" / 15 March 2025 / Sarah Mitchell\nExperience: \"Designing Immersive Worlds That Feel Real\" / \"From haptic feedback to photorealistic rendering...\" / 22 April 2025 / James Park\n\nCUSTOM CSS (index.css):\n\n.video-plus-darker {\n  mix-blend-mode: normal !important;\n}\n\n.app-hero-wrapper {\n  min-height: 100vh;\n  overflow: hidden;\n}\n\n@media (min-width: 768px) {\n  .app-hero-wrapper {\n    min-height: auto;\n    height: 100vh;\n  }\n}\n\n.hero-description-group {\n  margin-right: 0;\n}\n\n.hero-stat-group {\n  margin-right: 0;\n}\n\n@media (min-width: 768px) {\n  .hero-description-group {\n    margin-right: 50%;\n  }\n\n  .hero-stat-group {\n    margin-right: 20%;\n  }\n}\n\nKEY DETAILS:\n\nTech stack: React 18, Vite, TypeScript, Tailwind CSS 3, lucide-react for all icons\nNo custom fonts -- default Tailwind sans-serif stack\nColor palette: White hero (#FBFDFD), dark sections (#0F0F0F), neutral grays from Tailwind for text\nThe diagonal divider SVG polygon creates an angled transition from the light hero to the dark about section. It is positioned absolutely at the bottom of the hero wrapper.\nBoth videos are autoPlay, loop, muted, playsInline\nThe hero section has pb-20 md:pb-36 bottom padding to prevent the diagonal divider from overlapping the \"Trusted by Clients\" content\nThe SectionDivider component is rendered inside the hero wrapper div (not between wrapper and AboutSection)\nLogo image at /image.png in the public folder\nInsight images at /Mask_group.jpg, /Mask_group-1.jpg, /Mask_group-2.jpg in the public folder"},{"id":"celestia-hero","title":"Celestia","category":"Hero Section","type":"hero","_free":true,"videoUrl":"https://res.cloudinary.com/dfonotyfb/video/upload/v1775585556/dds3_1_rqhg7x.mp4","thumb":"https://motionsites.ai/assets/hero-celestia-poster-DdQh9L5K.png","prompt":"Create a full-screen dark hero section with a cinematic, premium aesthetic.Background Video:\nhttps://res.cloudinary.com/dfonotyfb/video/upload/v1775585556/dds3_1_rqhg7x.mp4\nImplement as: <video autoPlay loop muted playsInline className=\"absolute inset-0 w-full h-full object-cover z-0\"><source src=\"https://res.cloudinary.com/dfonotyfb/video/upload/v1775585556/dds3_1_rqhg7x.mp4\" type=\"video/mp4\" /> </video>"},{"id":"velorah-hero","title":"Velorah","category":"Agency","type":"hero","_free":true,"videoUrl":"https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_131748_f2ca2a28-fed7-44c8-b9a9-bd9acdd5ec31.mp4","thumb":"https://motionsites.ai/assets/hero-velorah-poster-mLkXfzr9.png","prompt":"Create a single-page hero section with a fullscreen looping background video, glassmorphic navigation, and cinematic typography. Use React + Vite + Tailwind CSS + TypeScript with shadcn/ui.\n\nVideo Background:\n\nFullscreen <video> element with autoPlay, loop, muted, playsInline\nSource URL: https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_131748_f2ca2a28-fed7-44c8-b9a9-bd9acdd5ec31.mp4\nPositioned absolute inset-0 w-full h-full object-cover z-0\n\nFonts:\n\nImport from Google Fonts: Instrumental Serif (display) and Inter weights 400/500 (body)\nCSS variables: --font-display: 'Instrument Serif', serif and --font-body: 'Inter', sans-serif\nBody uses var(--font-body), headings use inline fontFamily: \"'Instrument Serif', serif\"\n\nColor Theme (dark, HSL values for CSS variables):\n\n--background: 201 100% 13% (deep navy blue)\n--foreground: 0 0% 100% (white)\n--muted-foreground: 240 4% 66% (muted gray)\n--primary: 0 0% 100%, --primary-foreground: 0 0% 4%\n--secondary: 0 0% 10%, --muted: 0 0% 10%, --accent: 0 0% 10%\n--border: 0 0% 18%, --input: 0 0% 18%\n\nNavigation Bar:\n\nrelative z-10, flex row, justify-between, px-8 py-6, max-w-7xl mx-auto\nLogo: \"Velorah®\" (® as <sup className=\"text-xs\">), text-3xl tracking-tight, Instrument Serif font, text-foreground\nNav links (hidden on mobile, md:flex): Home (active, text-foreground), Studio, About, Journal, Reach Us — all text-sm text-muted-foreground with hover:text-foreground transition-colors\nCTA button: \"Begin Journey\", liquid-glass rounded-full px-6 py-2.5 text-sm text-foreground, hover:scale-[1.03]\n\nHero Section:\n\nrelative z-10, flex column, centered, text-center, px-6 pt-32 pb-40 py-[90px]\nH1: \"Where dreams rise through the silence.\" — text-5xl sm:text-7xl md:text-8xl, leading-[0.95], tracking-[-2.46px], max-w-7xl, font-normal, Instrument Serif. The words \"dreams\" and \"through the silence.\" wrapped in <em className=\"not-italic text-muted-foreground\"> for color contrast\nSubtext: text-muted-foreground text-base sm:text-lg max-w-2xl mt-8 leading-relaxed — \"We're designing tools for deep thinkers, bold creators, and quiet rebels. Amid the chaos, we build digital spaces for sharp focus and inspired work.\"\nCTA button: \"Begin Journey\", liquid-glass rounded-full px-14 py-5 text-base text-foreground mt-12, hover:scale-[1.03] cursor-pointer\n\nLiquid Glass Effect (CSS class .liquid-glass):\n\n.liquid-glass {\n  background: rgba(255, 255, 255, 0.01);\n  background-blend-mode: luminosity;\n  backdrop-filter: blur(4px);\n  -webkit-backdrop-filter: blur(4px);\n  border: none;\n  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);\n  position: relative;\n  overflow: hidden;\n}\n.liquid-glass::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  border-radius: inherit;\n  padding: 1.4px;\n  background: linear-gradient(180deg,\n    rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,\n    rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,\n    rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);\n  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);\n  -webkit-mask-composite: xor;\n  mask-composite: exclude;\n  pointer-events: none;\n}\n\nAnimations (CSS keyframes + classes):\n\n@keyframes fade-rise {\n  from { opacity: 0; transform: translateY(24px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n.animate-fade-rise { animation: fade-rise 0.8s ease-out both; }\n.animate-fade-rise-delay { animation: fade-rise 0.8s ease-out 0.2s both; }\n.animate-fade-rise-delay-2 { animation: fade-rise 0.8s ease-out 0.4s both; }\n\nH1 gets animate-fade-rise\nSubtext gets animate-fade-rise-delay\nHero CTA button gets animate-fade-rise-delay-2\n\nLayout: No decorative blobs, radial gradients, or overlays. Minimalist, cinematic, vertically centered hero. The video provides all visual depth."},{"id":"liquid-glass-agency","title":"Liquid Glass Agency","category":"Landing Page","type":"landing-page","_free":false,"videoUrl":"https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260307_083826_e938b29f-a43a-41ec-a153-3d4730578ab8.mp4","thumb":"https://motionsites.ai/assets/hero-liquid-glass-agency-poster-BvnVaqJh.png","prompt":"Build a dark, premium, single-page landing page for an AI-powered web design agency using React + Vite + Tailwind CSS + shadcn/ui + Framer Motion (motion/react). The page has a luxury editorial aesthetic -- black backgrounds, white text, liquid glass (glassmorphism) effects, and cinematic video backgrounds.\n\nFONTS\nImport from Google Fonts:\n\nhttps://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap\n* Headings: Instrument Serif (italic) -- used via Tailwind class font-heading\n* Body: Barlow (weights 300, 400, 500, 600) -- used via Tailwind class font-body\nTailwind config extends fontFamily:\n\nheading: [\"'Instrument Serif'\", \"serif\"]\nbody: [\"'Barlow'\", \"sans-serif\"]\n\nCOLOR THEME (CSS custom properties, HSL format)\n\n:root {\n  --background: 213 45% 67%;\n  --foreground: 0 0% 100%;\n  --card: 213 45% 62%;\n  --card-foreground: 0 0% 100%;\n  --primary: 0 0% 100%;\n  --primary-foreground: 213 45% 67%;\n  --secondary: 213 45% 72%;\n  --secondary-foreground: 0 0% 100%;\n  --muted: 213 35% 60%;\n  --muted-foreground: 0 0% 100% / 0.7;\n  --accent: 213 45% 72%;\n  --accent-foreground: 0 0% 100%;\n  --destructive: 0 84.2% 60.2%;\n  --border: 0 0% 100% / 0.2;\n  --input: 0 0% 100% / 0.2;\n  --ring: 0 0% 100% / 0.3;\n  --radius: 9999px;\n  --glass-bg: rgba(255, 255, 255, 0.12);\n  --glass-border: rgba(255, 255, 255, 0.25);\n  --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);\n  --glass-blur: 16px;\n}\n\nLIQUID GLASS CSS (the core visual effect)\nTwo utility classes defined in index.css under @layer components:\n.liquid-glass (subtle):\n\n.liquid-glass {\n  background: rgba(255, 255, 255, 0.01);\n  background-blend-mode: luminosity;\n  backdrop-filter: blur(4px);\n  -webkit-backdrop-filter: blur(4px);\n  border: none;\n  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);\n  position: relative;\n  overflow: hidden;\n}\n.liquid-glass::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  border-radius: inherit;\n  padding: 1.4px;\n  background: linear-gradient(\n    180deg,\n    rgba(255, 255, 255, 0.45) 0%,\n    rgba(255, 255, 255, 0.15) 20%,\n    rgba(255, 255, 255, 0) 40%,\n    rgba(255, 255, 255, 0) 60%,\n    rgba(255, 255, 255, 0.15) 80%,\n    rgba(255, 255, 255, 0.45) 100%\n  );\n  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);\n  -webkit-mask-composite: xor;\n  mask-composite: exclude;\n  pointer-events: none;\n}\n.liquid-glass-strong (more prominent, used on CTA buttons):\n\n.liquid-glass-strong {\n  background: rgba(255, 255, 255, 0.01);\n  background-blend-mode: luminosity;\n  backdrop-filter: blur(50px);\n  -webkit-backdrop-filter: blur(50px);\n  border: none;\n  box-shadow: 4px 4px 4px rgba(0, 0, 0, 0.05),\n    inset 0 1px 1px rgba(255, 255, 255, 0.15);\n  position: relative;\n  overflow: hidden;\n}\n.liquid-glass-strong::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  border-radius: inherit;\n  padding: 1.4px;\n  background: linear-gradient(\n    180deg,\n    rgba(255, 255, 255, 0.5) 0%,\n    rgba(255, 255, 255, 0.2) 20%,\n    rgba(255, 255, 255, 0) 40%,\n    rgba(255, 255, 255, 0) 60%,\n    rgba(255, 255, 255, 0.2) 80%,\n    rgba(255, 255, 255, 0.5) 100%\n  );\n  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);\n  -webkit-mask-composite: xor;\n  mask-composite: exclude;\n  pointer-events: none;\n}\nThe ::before pseudo-element creates a gradient border effect using the mask-composite trick (thin glowing border that fades in the middle).\n\nASSETS & MEDIA URLS\nHero background video (MP4, CloudFront):\n\nhttps://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260307_083826_e938b29f-a43a-41ec-a153-3d4730578ab8.mp4\nPoster image: /images/hero_bg.jpeg (local file in public/images/)\nStartSection video (HLS via Mux):\n\nhttps://stream.mux.com/9JXDljEVWYwWu01PUkAemafDugK89o01BR6zqJ3aS9u00A.m3u8\nStats section video (HLS via Mux, displayed desaturated):\n\nhttps://stream.mux.com/NcU3HlHeF7CUL86azTTzpy3Tlb00d6iF3BmCdFslMJYM.m3u8\nCTA/Footer section video (HLS via Mux):\n\nhttps://stream.mux.com/8wrHPCX2dC3msyYU9ObwqNdm00u3ViXvOSHUMRYSEe5Q.m3u8\nFeature GIFs (imported from src/assets/):\n* feature-1.gif -- used in FeaturesChess row 1 (right side)\n* feature-2.gif -- used in FeaturesChess row 2 (left side)\nLogo icon: src/assets/logo-icon.png (12x12 Tailwind = h-12 w-12)\n\nSECTION-BY-SECTION BREAKDOWN\n1. NAVBAR (fixed, floating)\n* Fixed position: fixed top-4 left-0 right-0 z-50, horizontal padding px-8 lg:px-16, vertical py-3\n* Left: Logo image (h-12 w-12)\n* Center (desktop only, hidden md:flex): Navigation links inside a liquid-glass rounded-full px-1.5 py-1 pill container\n    * Links: \"Home\", \"Services\", \"Work\", \"Process\", \"Pricing\"\n    * Each link: px-3 py-2 text-sm font-medium text-foreground/90 font-body\n    * Last item: white solid button \"Get Started\" with ArrowUpRight icon, bg-white text-black rounded-full px-3.5 py-1.5 text-sm\n2. HERO SECTION\n* Container: relative overflow-visible, fixed height 1000px\n* Background video: <video> tag with autoPlay, loop, muted, playsInline. Positioned absolute left-0 w-full h-auto object-contain z-0 with top: 20%. Source is the CloudFront MP4 URL. Poster is /images/hero_bg.jpeg.\n* Dark overlay: absolute inset-0 bg-black/5 z-0\n* Bottom gradient fade: absolute bottom-0, height 300px, linear-gradient(to bottom, transparent, black)\n* Content (z-10, centered, paddingTop: 150px):\n    * Badge pill: liquid-glass rounded-full px-1 py-1 with inner white \"New\" badge (bg-white text-black rounded-full px-3 py-1 text-xs font-semibold) and text \"Introducing AI-powered web design.\"\n    * Heading (BlurText component): \"The Website Your Brand Deserves\" -- text-6xl md:text-7xl lg:text-[5.5rem] font-heading italic text-foreground leading-[0.8] max-w-2xl tracking-[-4px], animated word-by-word from bottom with blur, delay 100ms\n    * Subtext (motion.p): \"Stunning design. Blazing performance. Built by AI, refined by experts. This is web design, wildly reimagined.\" -- blur-in animation, delay 0.8s, text-sm md:text-base text-white font-body font-light leading-tight\n    * CTA buttons (motion.div, delay 1.1s):\n        * \"Get Started\" -- liquid-glass-strong rounded-full px-5 py-2.5 with ArrowUpRight icon\n        * \"Watch the Film\" -- text-only with Play icon (filled)\n    * Partners bar at bottom (mt-auto pb-8 pt-16): \"Trusted by the teams behind\" liquid-glass pill, then 5 partner names rendered in text-2xl md:text-3xl font-heading italic text-white with gap-12 md:gap-16: Stripe, Vercel, Linear, Notion, Figma\n3. BlurText COMPONENT (custom animated text)\n* Splits text by words or letters\n* Uses IntersectionObserver to trigger on scroll\n* Each word/letter is a <motion.span> that animates from {filter: 'blur(10px)', opacity: 0, y: 50} (when direction=bottom) through {filter: 'blur(5px)', opacity: 0.5, y: -5} to {filter: 'blur(0px)', opacity: 1, y: 0}\n* Staggered by index with configurable delay (default 200ms per element)\n* Step duration 0.35s per keyframe step\n4. START SECTION (\"How It Works\")\n* Full-width section with HLS video background using hls.js library\n* Video: autoPlay, loop, muted, playsInline, absolute inset-0 w-full h-full object-cover\n* Top and bottom gradient fades (200px each, black to transparent)\n* Content centered (z-10, minHeight 500px):\n    * Badge: \"How It Works\" in liquid-glass rounded-full px-3.5 py-1\n    * Heading: \"You dream it. We ship it.\" -- text-4xl md:text-5xl lg:text-6xl font-heading italic tracking-tight leading-[0.9]\n    * Subtext: \"Share your vision. Our AI handles the rest--wireframes, design, code, launch. All in days, not quarters.\" -- text-white/60 font-body font-light text-sm md:text-base\n    * CTA: \"Get Started\" liquid-glass-strong rounded-full px-6 py-3\n5. FEATURES CHESS (alternating rows)\n* Section header: \"Capabilities\" badge + \"Pro features. Zero complexity.\" heading\n* Row 1 (flex, content left / image right):\n    * Title: \"Designed to convert. Built to perform.\"\n    * Body: \"Every pixel is intentional. Our AI studies what works across thousands of top sites--then builds yours to outperform them all.\"\n    * Button: \"Learn more\" liquid-glass-strong\n    * Gif: https://motionsites.ai/assets/hero-finlytic-preview-CV9g0FHP.gif download and place inside liquid-glass rounded-2xl overflow-hidden\n* Row 2 (flex-row-reverse, content right / image left):\n    * Title: \"It gets smarter. Automatically.\"\n    * Body: \"Your site evolves on its own. AI monitors every click, scroll, and conversion--then optimizes in real time. No manual updates. Ever.\"\n    * Button: \"See how it works\" liquid-glass-strong\n    * gif: https://motionsites.ai/assets/hero-wealth-preview-B70idl_u.gif download and place inside liquid-glass rounded-2xl overflow-hidden\n6. FEATURES GRID (\"Why Us\")\n* Section header: \"Why Us\" badge + \"The difference is everything.\" heading\n* 4-column grid (grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6), each card is liquid-glass rounded-2xl p-6:\n    1. Icon: Zap -- \"Days, Not Months\" -- \"Concept to launch at a pace that redefines fast. Because waiting isn't a strategy.\"\n    2. Icon: Palette -- \"Obsessively Crafted\" -- \"Every detail considered. Every element refined. Design so precise, it feels inevitable.\"\n    3. Icon: BarChart3 -- \"Built to Convert\" -- \"Layouts informed by data. Decisions backed by performance. Results you can measure.\"\n    4. Icon: Shield -- \"Secure by Default\" -- \"Enterprise-grade protection comes standard. SSL, DDoS mitigation, compliance. All included.\"\n    * Each icon sits in a liquid-glass-strong rounded-full w-10 h-10 circle\n7. STATS SECTION\n* HLS video background (Mux URL), displayed with filter: saturate(0) (desaturated/B&W)\n* Top and bottom gradient fades (200px each)\n* Content: liquid-glass rounded-3xl p-12 md:p-16 card with 4-column grid:\n    * \"200+\" / \"Sites launched\"\n    * \"98%\" / \"Client satisfaction\"\n    * \"3.2x\" / \"More conversions\"\n    * \"5 days\" / \"Average delivery\"\n    * Values: text-4xl md:text-5xl lg:text-6xl font-heading italic\n    * Labels: text-white/60 font-body font-light text-sm\n8. TESTIMONIALS\n* Section header: \"What They Say\" badge + \"Don't take our word for it.\" heading\n* 3-column grid (md:grid-cols-3 gap-6), each card is liquid-glass rounded-2xl p-8:\n    1. \"A complete rebuild in five days. The result outperformed everything we'd spent months building before.\" -- Sarah Chen, CEO, Luminary\n    2. \"Conversions up 4x. That's not a typo. The design just works differently when it's built on real data.\" -- Marcus Webb, Head of Growth, Arcline\n    3. \"They didn't just design our site. They defined our brand. World-class doesn't begin to cover it.\" -- Elena Voss, Brand Director, Helix\n    * Quote: text-white/80 font-body font-light text-sm italic\n    * Name: text-white font-body font-medium text-sm\n    * Role: text-white/50 font-body font-light text-xs\n9. CTA + FOOTER\n* HLS video background (Mux URL)\n* Top and bottom gradient fades (200px each)\n* Content (z-10, centered):\n    * Heading: \"Your next website starts here.\" -- text-5xl md:text-6xl lg:text-7xl font-heading italic leading-[0.85]\n    * Subtext: \"Book a free strategy call. See what AI-powered design can do. No commitment, no pressure. Just possibilities.\"\n    * Two buttons:\n        * \"Book a Call\" -- liquid-glass-strong rounded-full px-6 py-3\n        * \"View Pricing\" -- bg-white text-black rounded-full px-6 py-3\n    * Footer bar (mt-32 pt-8 border-t border-white/10):\n        * Left: \"(c) 2026 Studio. All rights reserved.\" text-white/40 text-xs\n        * Right: \"Privacy\", \"Terms\", \"Contact\" links text-white/40 text-xs\n\nKEY DEPENDENCIES\n\n{\n  \"motion\": \"^12.35.0\",\n  \"hls.js\": \"^1.6.15\",\n  \"lucide-react\": \"^0.462.0\",\n  \"react-router-dom\": \"^6.30.1\"\n}\nIcons used from lucide-react: ArrowUpRight, Play, Zap, Palette, BarChart3, Shield\n\nOVERALL PAGE STRUCTURE\n\n<div bg-black>\n  <div z-10>\n    <Navbar />           -- fixed floating nav\n    <Hero />             -- 1000px tall, CloudFront MP4 video bg\n    <div bg-black>\n      <StartSection />   -- HLS video bg, \"How It Works\"\n      <FeaturesChess />  -- alternating text/gif rows\n      <FeaturesGrid />   -- 4-card grid\n      <Stats />          -- HLS video bg (desaturated), stats card\n      <Testimonials />   -- 3-card grid\n      <CtaFooter />      -- HLS video bg, CTA + footer\n    </div>\n  </div>\n</div>\n\nANIMATION PATTERNS\n1. BlurText (heading): Word-by-word stagger from bottom with gaussian blur dissolve, IntersectionObserver triggered\n2. Hero subtext: motion.p with filter: blur(10px) -> blur(0px), opacity: 0 -> 1, y: 20 -> 0, delay 0.8s, duration 0.6s\n3. Hero CTA buttons: Same blur-in pattern, delay 1.1s\n4. All video backgrounds: autoPlay, loop, muted, playsInline with top/bottom black gradient fades (200px typically, 300px on hero bottom)\n\nDESIGN PATTERNS USED THROUGHOUT\n* Every section badge: liquid-glass rounded-full px-3.5 py-1 text-xs font-medium text-white font-body\n* Every section heading: text-4xl md:text-5xl lg:text-6xl font-heading italic text-white tracking-tight leading-[0.9]\n* Every body text: text-white/60 or text-white/70, font-body font-light text-sm md:text-base\n* Primary CTA: liquid-glass-strong rounded-full with ArrowUpRight nts, cards, and UI components.\" -- 17px, gray-light color, max-width 520px, 1.5 line-height\nTwo buttons below: Primary \"GET STARTED\" button (green, white text, 12px border-radius, 4px green box-shadow for 3D effect, uppercase bold) and Secondary \"I ALREADY HAVE AN ACCOUNT\" button (transparent with 2px gray border, blue text, 4px gray box-shadow for 3D effect)\nBoth buttons: 48px height, 24px horizontal padding, 15px font-size, 700 weight, uppercase\nButtons have active state: box-shadow removed, translateY(4px)\nPadding: 56px top, 40px sides, 40px bottom\nMain Grid (2-column grid, no gap, max-width 1440px)\nEach panel has 36px vertical and 40px horizontal padding, bottom border and right border (border-color). Even panels have no right border.\n\nEach panel has a section label: 11px, 800 weight, uppercase, 2px letter-spacing, gray (nav-text), with a 1px line extending to the right via ::after pseudo-element.\n\nPanels in order (left-to-right, top-to-bottom):\n\nPanel 1: Color Palette (light)\nGrid of 12 color swatches, grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)), 12px gap. Each swatch:\n\nSquare (aspect-ratio: 1), 12px border-radius, 1px border rgba(0,0,0,0.06)\nHover: scale(1.05) with box-shadow 0 8px 24px rgba(0,0,0,0.12)\nBelow swatch: name (12px, bold, gray-text) and hex value (10px, gray-light, semi-bold)\nColors in order:\n\nGreen -- rgb(88, 204, 2) -- #58CC02\nGreen Hover -- rgb(75, 178, 0) -- #4BB200\nBlue -- rgb(28, 176, 246) -- #1CB0F6\nDark Blue -- rgb(16, 15, 62) -- #100F3E\nRed -- #FF4B4B\nOrange -- #FF9600\nGolden -- #FFC800\nFooter Green -- #4EC604\nGray Text -- rgb(75, 75, 75) -- #4B4B4B\nGray Light -- rgb(119, 119, 119) -- #777777\nNav Text -- rgb(175, 175, 175) -- #AFAFAF\nBorder -- rgb(229, 229, 229) -- #E5E5E5\nPanel 2: Typography (light)\nVertical stack with 20px gap. Each row is a flex row (baseline-aligned, 20px gap) with a meta column (80px wide, right-aligned) showing size in blue (11px bold) and weight label below (10px, nav-text color), then the sample text.\n\nRows:\n\n48px / Feather Bold -- \"Display\" -- green color, Feather Bold font\n32px / Bold 700 -- \"Heading One\" -- gray-text color\n28px / Feather Bold -- \"heading two\" (lowercase) -- green color, Feather Bold font\n18px / Medium 500 -- \"Body text for paragraphs and descriptions with comfortable reading line-height.\" -- gray-light color, 1.6 line-height\n14px / Bold 700 -- \"CAPTION LABEL\" -- uppercase, nav-text color, 0.5px letter-spacing\n12px / Semi 600 -- \"Small utility text for metadata and hints\" -- gray-light color\nPanel 3: Button Variants (light)\nVertical stack with 16px gap. Each row has an 80px label (10px, bold, uppercase, 1px letter-spacing, nav-text) then buttons with 12px gap, flex-wrap.\n\nRows:\n\n\"Primary\" -- 3 buttons: \"GET STARTED\" (green bg, white text, 4px green shadow), \"SMALL\" (same but 36px height, 13px font, 16px padding, 10px radius, 3px shadow), \"DISABLED\" (same as primary but opacity 0.45, pointer-events none)\n\"Secondary\" -- 3 buttons: \"LEARN MORE\" (transparent, 2px #CFCFCF border, blue text, 4px #CFCFCF shadow), \"SMALL\" (same sizing as small primary), \"DISABLED\" (opacity 0.45)\n\"Danger\" -- 2 buttons: \"DELETE\" (#FF4B4B bg, white text, 4px #CC3C3C shadow), \"REMOVE\" (small variant)\n\"Ghost\" -- 1 button: \"VIEW ALL\" (no bg/border/shadow, green text, green bg on hover at 0.08 opacity)\nPanel 4: Dark Theme Buttons (dark-blue background)\nSection label and ::after line use white at 35% and 10% opacity respectively.\n\nTwo rows:\n\n\"GET STARTED\" primary + \"TRY 1 WEEK FREE\" (white bg, dark-blue text, 4px #88879F shadow, hover bg #c8f040)\nSmall variants of both\nPanel 5: Cards (light)\n2-column grid, 16px gap. Each card: white bg, 2px border (border-color), 16px border-radius. Hover: translateY(-4px), box-shadow 0 12px 32px rgba(0,0,0,0.08).\n\nCard 1:\n\nImage: https://images.pexels.com/photos/4145354/pexels-photo-4145354.jpeg?auto=compress&cs=tinysrgb&w=400&h brown #b8920f text, golden bg 15%)\nInput + Button: Flex row, 12px gap. Input (flex:1, 48px height, 16px padding, 2px border border-color, 12px radius, 15px font, 600 weight, focus border turns blue, placeholder is nav-text color 500 weight) + Primary \"SUBSCRIBE\" button.\n\nToggle: Flex row with two toggle switches. Each toggle is 48x28px. Track is border-color bg, 14px radius. Thumb is 22x22px white circle, 3px from edges, with 1px 3px rgba(0,0,0,0.15) shadow. Checked state: track turns green, thumb translates 20px right. Labels \"Sound effects\" and \"Animations\" (14px, 600 weight). First toggle is checked by default.\n\nProgress: 3 progress bars in a column, 10px gap. Each row: flex, 12px gap, bar (flex:1, 12px height, border-color bg, 6px radius, overflow hidden), fill (6px radius, 0.6s ease width transition), value (12px bold, 32px wide, right-aligned).\n\n85% green fill\n60% blue fill\n35% orange fill\nTooltips & Streak: Flex row, 16px gap, center-aligned.\n\nTooltip trigger: \"Hover me\" (13px, bold, green text, green bg 8%, 8px/16px padding, 8px radius). On hover shows tooltip bubble above (dark-blue bg, white 12px 600-weight text, 6px/12px padding, 8px radius, 5px triangle arrow pointing down via ::after border trick).\nStreak counter: Inline-flex, 6px gap, 6px/14px padding, orange bg 10%, 20px radius. Fire emoji (18px) + \"42\" (16px, 800 weight, orange).\nPanel 8: Dark Theme Components (dark-blue background)\nLabels use white at 30% opacity.\n\nLanguage Pills: Flex row, 8px gap. Each pill: inline-flex, 6px gap, 6px/12px padding, 2px border, 12px radius, cursor pointer, hover turns border green with subtle green bg.\n\n\"Spanish\" (ACTIVE -- green border, green bg 8%, white text) with flag https://d35aaqx5ub95lt.cloudfront.net/vendor/59a90a2cedd48b751a8fd22014768fd7.svg\n\"French\" (inactive -- white border 12%, white text 70%) with flag https://d35aaqx5ub95lt.cloudfront.net/vendor/482fda142ee4abd728ebf4ccce5d3307.svg\n\"German\" with flag https://d35aaqx5ub95lt.cloudfront.net/vendor/c71db846ffab7e0a74bc6971e34ad82e.svg\n\"Japanese\" with flag https://d35aaqx5ub95lt.cloudfront.net/vendor/edea4fa18ff3e7d8c0282de3f102aaed.svg\nFlag images: 24x18px, object-fit contain. Pill text: 13px, bold.\nAvatar Group: Flex row with overlapping circular avatars (36px, 50% radius, 2px white border, -8px margin-left except first). Images:\n\nhttps://images.pexels.com/photos/774909/pexels-photo-774909.jpeg?auto=compress&cs=tinysrgb&w=80&h=80&fit=crop\nhttps://images.pexels.com/photos/1222271/pexels-photo-1222271.jpeg?auto=compress&cs=tinysrgb&w=80&h=80&fit=crop\nhttps://images.pexels.com/photos/733872/pexels-photo-733872.jpeg?auto=compress&cs=tinysrgb&w=80&h=80&fit=crop\nCount badge \"+5\" (same 36px circle, #f0f0f0 bg, 11px 800 weight, gray-light)\nText next to group: \"8 learners active\" (13px, 600 weight, white 50% opacity)\nProgress (Dark): 2 bars, track bg is white 8%, values are white 60%:\n\n72% golden fill\n45% green fill\nBadges (Dark):\n\n\"MASTERED\" (green bg 15%, #7ADB2E text)\n\"REVIEW\" (blue bg 15%, #4DC4F8 text)\n\"CROWN\" (golden bg 15%, #FFC800 text)\nResponsive Breakpoints\n900px and below:\n\nGrid becomes single column, no right borders\nHero h1: 36px\nNav links hidden\nCards grid becomes single column\nHero buttons stack vertically, max-width 280px\n600px and below:\n\nHero padding: 40px 20px 32px\nHero h1: 28px\nPanel padding: 28px 20px\nColor grid: 3 columns\nType meta column: hidden\nDisplay type: 32px\nButton labels: hidden\nInput row: column direction\n"},{"id":"codenest-hero","title":"CodeNest Coding Platform","category":"Landing Page","type":"hero","_free":true,"videoUrl":"https://stream.mux.com/tLkHO1qZoaaQOUeVWo8hEBeGQfySP02EPS02BmnNFyXys.m3u8","thumb":"https://motionsites.ai/assets/hero-codenest-poster-Cq1PVGCy.png","prompt":"Create a high-end, dark-themed hero section for a coding education platform called 'CodeNest' using React and Tailwind CSS. The design must be responsive and follow these precis
