oudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260324_151826_c7218672-6e92-402c-9e45-f1e0f454bdc4.mp4","thumb":"https://motionsites.ai/assets/hero-mindloop-poster-2_RhEWJd.png","prompt":"Create a full-screen hero section with a background video, navbar, and centered content. Use a dark theme with all white text.\n\nBackground Video:\n\nFull-screen <video> element with autoPlay loop muted playsInline\nPositioned absolute inset-0 w-full h-full object-cover z-0\nSource URL: https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260324_151826_c7218672-6e92-402c-9e45-f1e0f454bdc4.mp4\nFont:\n\nImport Google Font: Instrument Serif (display) and Inter (body)\nAll headings use font-family: 'Instrument Serif', serif\nBody text uses Inter, sans-serif\nNavbar (relative z-10):\n\nFlex row, justify-between, px-8 py-6, max-w-7xl mx-auto\nLeft: Brand name \"Velorah®\" — text-3xl tracking-tight, white, Instrument Serif. The ® is wrapped in <sup className=\"text-xs\">\nCenter: Hidden on mobile (hidden md:flex), links: Home, Studio, About, Journal, Reach Us — text-sm text-white, gap-10, hover:opacity-80 transition-opacity\nRight: \"Begin Journey\" button with liquid-glass effect, rounded-full px-6 py-2.5 text-sm, hover:scale-[1.03]\nHero Content (relative z-10):\n\nFlex column, centered (items-center justify-center text-center), px-6 pt-32 pb-40\nH1: \"Focus in a Distracted World\" — text-5xl sm:text-7xl md:text-8xl, leading-[0.95], tracking-[-2.46px], max-w-7xl, white, Instrument Serif, animate-fade-rise\nParagraph: \"We're designing tools for deep thinkers, bold creators, and quiet rebels. Amid the chaos, we build digital spaces for sharp focus and inspired work.\" — text-base sm:text-lg, max-w-2xl mt-8 leading-relaxed, white, animate-fade-rise-delay\nCTA Button: \"Begin Journey\" — liquid-glass, rounded-full px-14 py-5 text-base, white, mt-12, hover:scale-[1.03], animate-fade-rise-delay-2\nLiquid Glass CSS (.liquid-glass):\n\n.liquid-glass {\n  background: rgba(255, 255, 255, 0.01);\n  background-blend-mode: luminosity;\n  backdrop-filter: blur(4px);\n  -webkit-backdrop-filter: blur(4px);\n  border: none;\n  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);\n  position: relative;\n  overflow: hidden;\n}\n.liquid-glass::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  border-radius: inherit;\n  padding: 1.4px;\n  background: linear-gradient(180deg,\n    rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,\n    rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,\n    rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);\n  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);\n  -webkit-mask-composite: xor;\n  mask-composite: exclude;\n  pointer-events: none;\n}\nAnimations:\n\n@keyframes fade-rise {\n  from { opacity: 0; transform: translateY(24px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n.animate-fade-rise { animation: fade-rise 0.8s ease-out both; }\n.animate-fade-rise-delay { animation: fade-rise 0.8s ease-out 0.2s both; }\n.animate-fade-rise-delay-2 { animation: fade-rise 0.8s ease-out 0.4s both; }\nPage background: bg-black (hsl(0,0%,0%)), section is min-h-screen overflow-hidden."},{"id":"19","title":"Viktor Portfolio","category":"Portfolio","type":"landing-page","_free":false,"videoUrl":"https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260304_101127_49ce07b7-f19a-4882-b19c-1d2a27d97ac3.mp4","thumb":"https://motionsites.ai/assets/hero-viktor-portfolio-poster-S-47espj.png","prompt":"Build a high-end, cinematic 2-page architectural portfolio using React, Tailwind CSS, and Framer Motion (motion/react). The aesthetic is minimalist, dark-themed (black background, white text), and uses a sophisticated typographic hierarchy.\n\nGlobal Configuration:\n\nFonts: Import and use 'Orbitron' for display headings, 'Space Grotesk' for body text, and 'JetBrains Mono' for technical/mono elements.\n\nSelection: Custom selection color (white background, black text).\n\nIcons: Use lucide-react (Snowflake, Maximize, Zap, ArrowLeft, ArrowRight).\n\nPage 1: Hero (Modern Architect)\n\nBackground: Full-screen looping video: https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260304_101127_49ce07b7-f19a-4882-b19c-1d2a27d97ac3.mp4.\n\nSettings: Muted, playsInline, loop, preload=\"auto\".\n\nOverlays: Radial vignette on desktop (70% transparent center to 70% black edges) and a bottom-fade gradient on mobile.\n\nTop Nav: Right-aligned '1/01' counter with a progress line and a 'Next Project' button in mono font.\n\nMain Content:\n\nLarge title: 'Viktor-O // MODERN ARCHITECT' (font-display, uppercase, tracking-tighter).\n\nDescription: Light-weight sans text with a max-width of 450px.\n\nTechnical Specs (Right Column): A list (Stack, Logic, Uptime, Scale) with labels and values separated by thin border-white/20.\n\nBottom Section:\n\nA glass-morphism card (bg-white/5, backdrop-blur-xl) with a tech image (https://picsum.photos/seed/tech/200/200), project title 'VK-01: React Engine', and a 'View Project' button.\n\nA row of pill-shaped tags (TS/JS, V1, Full-Stack, Cloud-Ready) at the bottom right.\n\nPage 2: Project Details (Projecty Engine)\n\nBackground: Full-screen looping video: https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260304_102019_f84678ca-ffe7-49a5-895a-75ac1f71ad46.mp4.\n\nOverlays: Subtle elliptical vignette to ensure text legibility.\n\nTop Nav: 'Back Home' button with an arrow icon.\n\nMain Content:\n\nMassive display title on the left: 'PROJECTY ENGINE' (leading-0.85, uppercase).\n\nRight-aligned description text about a flagship React engine, with a 'Read More' link featuring a minimalist underline.\n\nBottom Section:\n\nTwo structured info blocks: '01 // CORE ARCHITECTURE' and '02 // PERFORMANCE METRICS' with uppercase mono subtext.\n\nNavigation arrows (Left/Right) in circular borders and a meta-info block (Date | Project) with an italicized caption.\n\nInteractions & Responsiveness:\n\nUse AnimatePresence for smooth opacity/exit transitions between pages.\n\nImplement entrance animations for text and cards (opacity and y-offset).\n\nOn mobile: The video should occupy the top half (h-[50vh]) with a smooth gradient transition to the content below."},{"id":"18","title":"Loader Animation","category":"Component","type":"hero","_free":false,"videoUrl":"","thumb":"https://motionsites.ai/assets/hero-loader-animation-preview-C3_SX_Io.gif","prompt":"Build a fullscreen loading screen component in React (Next.js 14, TypeScript). Uses Framer Motion for animations. Here is the exact specification:\n\nTheme\n\ncss\n\n--bg: #0a0a0a;\n--text: #f5f5f5;\n--muted: #888888;\n--stroke: #1f1f1f;\n\nFonts: font-display → Instrument Serif (Google Fonts, italic, weight 400).\n\nComponent: LoadingScreen\n\nReceives one prop: onComplete: () => void.\n\nContainer: <motion.div> — fixed inset-0 z-[9999] bg-bg. Exit animation: exit={{ opacity: 0 }}, duration 0.6s, ease [0.4, 0, 0.2, 1]. Wrap in <AnimatePresence mode=\"wait\"> from the parent.\n\nElement 1: \"Portfolio\" Label (Top-Left)\n\n<motion.div> — absolute top-8 left-8 md:top-12 md:left-12.\nText: \"Portfolio\"\nClass: text-xs md:text-sm text-muted uppercase tracking-[0.3em]\nEntrance animation: initial={{ opacity: 0, y: -20 }}, animate={{ opacity: 1, y: 0 }}, duration 0.6s, delay 0.1s\n\nElement 2: Rotating Words (Center)\n\nabsolute inset-0 flex items-center justify-center.\nThree words cycle in sequence: \"Design\" → \"Create\" → \"Inspire\". A new word appears every 900ms. The word index increments via setInterval and stops at the last word (doesn't loop).\n\nEach word is a <motion.span> inside <AnimatePresence mode=\"wait\">, keyed by wordIndex:\nClass: text-4xl md:text-6xl lg:text-7xl font-display italic text-text/80\ninitial={{ opacity: 0, y: 20 }}\nanimate={{ opacity: 1, y: 0 }}\nexit={{ opacity: 0, y: -20 }}\ntransition={{ duration: 0.4, ease: [0.4, 0, 0.2, 1] }}\n\nElement 3: Counter (Bottom-Right)\n\n<motion.div> — absolute bottom-8 right-8 md:bottom-12 md:right-12.\nA number that counts from 000 → 100 over exactly 2.7 seconds using requestAnimationFrame. Each frame calculates elapsed / 2700 * 100. The number is displayed zero-padded to 3 digits (e.g. 007, 042, 100):\n\n{Math.round(progress).toString().padStart(3, '0')}\n\nClass: text-6xl md:text-8xl lg:text-9xl font-display text-text tabular-nums\nEntrance animation: initial={{ opacity: 0, y: 20 }}, animate={{ opacity: 1, y: 0 }}, duration 0.6s, delay 0.1s\n\nWhen progress reaches 100: Wait 400ms, then call onComplete(). Use a ref for onComplete to avoid stale closures.\n\nElement 4: Progress Bar (Bottom Edge)\n\nabsolute bottom-0 left-0 right-0. A 3px tall track:\nTrack: h-[3px] bg-stroke/50 (full width)\nFill: <motion.div> inside the track:\nh-full origin-left\nBackground: linear-gradient(90deg, #89AACC 0%, #4E85BF 100%)\nGlow: boxShadow: \"0 0 8px rgba(137, 170, 204, 0.35)\"\ninitial={{ scaleX: 0 }}\nanimate={{ scaleX: progress / 100 }}\ntransition={{ duration: 0.1, ease: \"linear\" }}\n\nParent Wrapper Behavior\n\nThe parent component (AppWrapper) controls visibility:\nState: isLoading starts true\nRenders <LoadingScreen onComplete={() => setIsLoading(false)} /> inside <AnimatePresence mode=\"wait\"> only when isLoading is true\nMain page content sits below with: style={{ opacity: isLoading ? 0 : 1, transition: \"opacity 0.5s ease-out\" }}\nWhen the loader calls onComplete, it triggers: loader fades out (0.6s) → page fades in (0.5s)\n\nTiming Summary\n\n0.0s — Loader appears, \"Portfolio\" slides in, counter starts at 000\n0.0s — \"Design\" appears\n0.9s — \"Create\" replaces \"Design\"\n1.8s — \"Inspire\" replaces \"Create\"\n2.7s — Counter hits 100, progress bar full\n3.1s — onComplete fires (400ms delay)\n3.1s — Loader fades out (0.6s exit animation)\n3.7s — Page content fades in (0.5s opacity transition)"},{"id":"15","title":"Dark Portfolio Hero","category":"Portfolio","type":"landing-page","_free":false,"videoUrl":"https://stream.mux.com/Gs3wZfrtz6ZfqZqQ02c02Z7lugV00FGZvRpcqFTel66r3g.m3u8","thumb":"https://motionsites.ai/assets/hero-portfolio-dark-poster-CDlMFIzp.png","prompt":"Build a Next.js 14 portfolio landing page with a full-screen hero section and an animated loading screen. The entire site uses a dark theme. Here is the exact specification:\n\nTech Stack\nNext.js 14 (App Router) + TypeScript\nTailwind CSS v3 with CSS custom properties for theming\nGSAP for hero entrance animations\nFramer Motion (AnimatePresence, motion) for the loading screen\nGoogle Fonts: Inter (body, variable --font-body) and Instrument Serif (display/headings, variable --font-display, weight 400, italic)\n\nDark Theme — CSS Variables\nSet on [data-theme=\"dark\"] (force dark mode, no toggle):\n\n--bg: #0a0a0a\n--surface: #141414\n--text: #f5f5f5\n--muted: #888888\n--accent: #f5f5f5\n--stroke: #1f1f1f\n\nMap these in Tailwind config as bg, surface, text, muted, accent, stroke color tokens. Font families: font-display → var(--font-display), font-body → var(--font-body).\n\nAccent Gradient (used everywhere)\nlinear-gradient(90deg, #89AACC 0%, #4E85BF 100%)\nThis blue gradient is used for: the navbar logo ring, button hover borders, the \"Say hi\" hover ring, and the loading screen progress bar.\n\nComponent 1: Loading Screen\nA full-screen loader (fixed inset-0 z-[9999]) with solid bg-bg background. It runs for 2.7 seconds, then fades out with Framer Motion exit={{ opacity: 0 }} over 0.6s.\n\nLayout (3 elements):\n\nTop-left: The word \"Portfolio\" — text-xs md:text-sm, text-muted, uppercase, tracking-[0.3em]. Positioned top-8 left-8 md:top-12 md:left-12. Animates in: y: -20 → 0, opacity: 0 → 1, duration 0.6s, delay 0.1s.\nCenter: Three words rotate in sequence — \"Design\" → \"Create\" → \"Inspire\" — one every 900ms. Styled text-4xl md:text-6xl lg:text-7xl font-display italic text-text/80. Uses AnimatePresence mode=\"wait\", each word enters from y: 20, exits to y: -20, duration 0.4s, easing [0.4, 0, 0.2, 1].\nBottom-right: A counter that counts from 000 → 100 over 2.7s using requestAnimationFrame. Styled text-6xl md:text-8xl lg:text-9xl font-display text-text tabular-nums. Positioned bottom-8 right-8 md:bottom-12 md:right-12. Animates in from y: 20.\nProgress bar: A thin 3px line at the very bottom. Background track is bg-stroke/50. The fill uses the accent gradient (#89AACC → #4E85BF) with a subtle glow (box-shadow: 0 0 8px rgba(137, 170, 204, 0.35)). Scales from scaleX(0) to scaleX(1) using transform-origin: left.\n\nBehavior: After the counter hits 100, wait 400ms, then call onComplete(). The parent AppWrapper toggles isLoading to false, which fades the loader out and fades the page content in (opacity 0 → 1, transition 0.5s ease-out).\n\nComponent 2: Navbar (inside Hero, fixed)\nA floating pill navbar, fixed top-0 left-0 right-0, centered with flex justify-center, z-50.\n\nPill container: inline-flex, rounded-full, backdrop-blur-md, border border-white/10, bg-surface, px-2 py-2. On scroll past 100px, adds shadow-md shadow-black/10.\n\nContents (left to right):\n\nLogo — a 36x36px circle (w-9 h-9) with the accent gradient as a 2px ring (p-[2px]). The inside is bg-bg with the letters \"JA\" centered in text-[13px] font-display italic tracking-tighter. On hover the gradient rotates (from/to colors swap) and the text scales 110%.\nDivider — w-px h-5 bg-stroke mx-1 (hidden on mobile)\nNav links: \"Home\", \"Work\", \"Resume\" — text-xs sm:text-sm, rounded-full, px-3 sm:px-4 py-1.5 sm:py-2. Active state: text-text bg-stroke/50. Hover: text-text bg-stroke/50.\nDivider\n\"Say hi ↗\" button — same pill styling, with a gradient border ring on hover.\nDivider\n\nComponent 3: Hero Section\nFull viewport height (min-h-screen), flex column, centered content.\n\nBackground video layer (absolute inset-0 z-0):\nVideo URL: https://stream.mux.com/Gs3wZfrtz6ZfqZqQ02c02Z7lugV00FGZvRpcqFTel66r3g.m3u8\nAn <video> element: autoPlay muted loop playsInline, with a .avif poster image as fallback.\nThe video is centered and covers the area: absolute top-1/2 left-1/2 min-w-full min-h-full -translate-x-1/2 -translate-y-1/2 object-cover.\nA subtle overlay: absolute inset-0 bg-black/20.\nA bottom fade gradient: absolute inset-x-0 bottom-0 h-48 bg-gradient-to-t from-bg to-transparent.\n\nContent (centered, z-10, text-center):\n\nEyebrow label: \"COLLECTION '26\" — text-xs text-muted uppercase tracking-[0.3em] mb-8. Class blur-in.\nName: \"Michael Smith\" — text-6xl md:text-8xl lg:text-9xl font-display italic leading-[0.9] tracking-tight text-text mb-6. Class name-reveal.\nRole line: A [Role] lives in Chicago. — text-lg md:text-xl lg:text-2xl text-muted mb-10. The [Role] cycles through \"Creative\" → \"Fullstack\" → \"Founder\" → \"Scholar\" every 2 seconds, styled as font-display italic text-text with a CSS animate-fade-in animation.\nBio: \"Designing seamless digital interactions by focusing on the unique nuances which bring systems to life.\" — text-sm md:text-base text-muted leading-relaxed max-w-md mb-12.\nCTA buttons (side by side):\n\"See Works\": px-7 py-3.5 bg-text text-bg text-sm rounded-full. On hover: scale-105, gradient border ring appears.\n\"Reach out...\": px-7 py-3.5 bg-bg text-text text-sm rounded-full border-2 border-stroke. Same gradient hover border technique.\n\nScroll indicator (bottom center, absolute bottom-8):\nThe word \"SCROLL\" — text-xs text-muted uppercase tracking-[0.2em].\nBelow it, a thin vertical line (w-px h-10 bg-stroke) with an animated dot sliding down on a 1.5s infinite loop.\n\nGSAP Entrance Animations (Hero)\nOn mount, a GSAP timeline (power3.out ease):\n.name-reveal: opacity 0→1, y 50→0, duration 1.2s, starting at 0.1s.\n.blur-in: opacity 0→1, filter blur(10px)→blur(0px), y 20→0, duration 1s, stagger 0.1s, starting at 0.3s."},{"id":"14","title":"Logoisum Video Agency","category":"Agency","type":"hero","_free":false,"videoUrl":"https://d8j0ntlcm91z4.cloudfront.net/u 18px text, hover brightness effect\n\n\"See Pricing\" — secondary (white) background, dark text, rounded-full, 18px text\n\nColor Theme (dark mode only, HSL values in CSS variables):\n\n--background: 240 67% 1% (near-black)\n\n--foreground: 0 0% 100% (white)\n\n--primary: 73 98% 57% (bright lime green)\n\n--primary-foreground: 240 67% 1% (dark)\n\n--secondary: 0 0% 100% (white)\n\n--secondary-foreground: 240 67% 1% (dark)\n\n--muted: 240 10% 12%\n\n--muted-foreground: 0 0% 82% / 0.8\n\n--border: 0 0% 100% / 0.1\n\nTech: React, TypeScript, Tailwind CSS, Lucide icons for ArrowUpRight and Menu/X icons."},{"id":"10","title":"AI Automation Hero","category":"AI / SaaS","type":"hero","_free":false,"videoUrl":"https://stream.mux.com/s8pMcOvMQXc4GD6AX4e1o01xFogFxipmuKltNfSYza0200.m3u8","thumb":"https://motionsites.ai/assets/hero-automation-machines-poster-CRJvUPpQ.png","prompt":"Create a full-screen hero section with the following exact specifications:\n\nLayout & Structure:\n- Full viewport height (h-screen), full width, relative positioning with overflow-hidden\n- Background color: #070612 (dark purple-black)\n- Content aligned to the left side, vertically centered\n- Max-width container (max-w-7xl) with horizontal padding (px-6 lg:px-12)\n\nBackground Video:\nVideo Source: HLS stream from https://stream.mux.com/s8pMcOvMQXc4GD6AX4e1o01xFogFxipmuKltNfSYza0200.m3u8\n- Autoplaying, looping, muted video positioned absolutely behind content\n- Video shifted 200px to the right (margin-left: 200px)\n- Video scaled to 1.2x with origin-left, object-cover, full height\n- Bottom fade gradient (h-40) from background color to transparent (z-10)\n\nBadge (top element):\n- Pill-shaped badge with rounded-full, border border-white/20, backdrop-blur-sm\n- Contains a Sparkles icon (lucide-react, w-3 h-3, text-white/80)\n- Text: \"New AI Automation Ally\" in text-sm font-medium text-white/80\n- Animated with blur-in effect (0.6s duration, no delay)\n\nMain Heading:\n- Three lines of text:\n  - Line 1: \"Unlock the Power of AI\" (block display)\n  - Line 2: \"for Your\" (inline)\n  - Line 3: \"Business.\" in serif italic font (inline)\n- Font sizes: text-4xl md:text-5xl lg:text-6xl\n- Font weight: font-medium\n- Line height: leading-tight lg:leading-[1.2]\n- Color: white (text-foreground)\n- Each word animates in with staggered split-text animation (0.08s delay between words, 0.6s duration, y: 40px -> 0, opacity: 0 -> 1)\n\nSubtitle:\n- Text: \"Our cutting-edge AI platform automates, analyzes, and accelerates your workflows so you can focus on what really matters.\"\n- Styling: text-white/80, text-lg, font-normal, leading-relaxed, max-w-xl\n- Animated with blur-in effect (0.4s delay, 0.6s duration)\n\nCTA Buttons (bottom):\n- Two buttons side by side with gap-4, flex-wrap\n- Primary button \"Book A Free Call\":\n  - Solid white background (bg-foreground), dark text (text-background)\n  - Rounded-full, px-5 py-3\n  - Includes right arrow icon (ArrowRight from lucide-react)\n  - Links to /book-call\n- Secondary button \"Learn now\":\n  - Semi-transparent background (bg-white/20), backdrop-blur-sm\n  - Rounded-full, px-8 py-3\n  - White text\n- Both buttons animated with blur-in effect (0.6s delay, 0.6s duration)\n\nAnimations (using framer-motion):\n- BlurIn component: opacity 0->1, blur 10px->0, y 20->0\n- SplitText component: splits text by words, staggers each word's animation\n\nZ-index layering:\n- Video: z-0\n- Bottom gradient: z-10\n- Content: z-20\n\nSpacing:\n- 12-unit gap (gap-12) between badge/heading group and CTA buttons\n- 6-unit gap (gap-6) between badge and heading, and between heading and subtitle"},{"id":"luminex-hero","title":"Luminex","category":"Hero Section","type":"hero","_free":true,"videoUrl":"","thumb":"https://motionsites.ai/assets/hero-luminex-poster-9lhDX6Fl.png","prompt":"Create a modern React landing page with a full-screen HLS video background, glassmorphic navigation header, and hero content positioned in the bottom-left corner."},{"id":"yacht-club-hero","title":"Yacht Club","category":"Landing Page","type":"hero","_free":false,"videoUrl":"","thumb":"https://motionsites.ai/assets/hero-yacht-club-poster-_Oi_fq0F.png","prompt":"Core Instruction\nAct as an elite, award-winning creative frontend developer. Your task is to perfectly recreate a luxury Yacht Club landing page experience with highly advanced WebGL-like DOM animations, a custom GSAP staggered menu, a Framer Motion video fleet overlay, and an interactive liquid distortion cursor trail.\nTech Stack\nFramework: React 19, Vite, TypeScript\nStyling: Tailwind CSS v4\nAnimation: motion/react (Framer Motion) and gsap\nFonts: @fontsource-variable/geist and Google Fonts (Instrument Serif)\n1. Global CSS & Theming (src/index.css)\nConfigure the global CSS exactly as follows using Tailwind v4 syntax:\nImport Instrument Serif from Google Fonts and tw-animate-css.\nDefine the base theme with OKLCH colors for a dark luxury aesthetic.\nSet --background: oklch(0.145 0 0); and --foreground: oklch(0.985 0 0);.\nUse --font-sans: \"Instrument Serif\", ui-serif, serif; and map --font-heading to it to force the serif font on headers. Force @layer base to have body { @apply bg-background text-foreground; }.\nEnsure all text throughout the app default to font-serif uppercase unless specified otherwise.\n2. Global State & App Structure (src/App.tsx)\nCreate a single-page app utilizing AnimatePresence. Manage two main states:\nisMenuOpen: Boolean linked to the custom GSAP menu.\nisFleetOpen: Boolean triggered by clicking \"Our Fleet\" in the menu.\nBackground Video:\nImplement an absolute, z-0 background wrapper using <motion.div>.\nFrame the following Vimeo iframe exactly:\n<iframe src=\"https://player.vimeo.com/video/1184061018?background=1&autoplay=1&loop=1&byline=0&title=0\" className=\"absolute top-1/2 left-1/2 w-[100vw] h-[56.25vw] min-h-[100vh] min-w-[177.77vh] -translate-x-1/2 -translate-y-1/2\" />\nUse motion.div to apply a dynamic CSS blur. When isFleetOpen is true, animate the filter to blur(100px) (duration 1.56s). When false, animate to blur(0px) (duration 1.3s).\n3. The Interactive Liquid Cursor Trail\nBuild an interactive liquid ripple system inside App.tsx utilizing a hidden SVG filter and a DOM pool of 80 div elements.\nThe SVG Filter:\nPlace this SVG at the top of the app container:\n<svg className=\"hidden\"><filter id=\"liquid-trail\"><feTurbulence type=\"fractalNoise\" baseFrequency=\"0.02\" numOctaves=\"2\" result=\"noise\" /><feDisplacementMap in=\"SourceGraphic\" in2=\"noise\" scale=\"30\" xChannelSelector=\"R\" yChannelSelector=\"G\" /></filter></svg>\nThe Ripple Logic:\nCreate an array of 80 objects with { x: 0, y: 0, age: 0, active: false } managed via useRef.\nOn window mousemove, calculate the distance since the last mouse position. If distance > 25px, spawn a new ripple by setting active = true, writing the X/Y coords, and incrementing a rotating current index (idx + 1) % 80.\nUse requestAnimationFrame to step the rings. For each active ring, increment age += 0.012.\nRing Math: size = 20 + (age * 280). opacity = 1 - Math.pow(age, 1.2).\nIf age >= 1, set opacity to 0 and scale to 0.\nThe React DOM nodes for the ripples should be absolute empty divs with inline styles: backdropFilter: 'url(#liquid-trail) blur(1px)', WebkitBackdropFilter: 'url(#liquid-trail) blur(1px)', boxShadow: 'inset 0 0 30px rgba(255,255,255,0.1), 0 0 15px rgba(147,197,253,0.15)', willChange: 'transform, opacity, width, height, left, top'\n4. Hero Content (!isFleetOpen state)\nWrap this inside <AnimatePresence> to mount/unmount seamlessly when the fleet viewer opens.\nMain Heading: Positioned absolute top-[96px] left-[20px] md:left-[96px].\nUse motion.div with staggered children variants mapping to: hidden: { opacity: 0, y: 40, transition: { duration: 0.48 } } and visible: { opacity: 1, y: 0, transition: { duration: 0.96 } }.\nThe text is: \"MASTER THE\" > \"ELEMENTS.\" (italicized) > \"EMBRACE THE\" > \"OCEAN\" (italicized).\nStyling: text-[64px] md:text-[140px] font-normal leading-none drop-shadow-2xl.\nSubtext:\nText: \"JOIN AN EXCLUSIVE COMMUNITY OF SAILORS. WHETHER YOU CRAVE THE THRILL OF THE OPEN SEA OR THE SERENITY OF A SUNSET CRUISE, YOUR NEXT GREAT ADVENTURE STARTS HERE.\"\nPosition: Pushed over slightly on desktop md:translate-x-[100px], text-[10px] md:text-xs, strictly w-[260px], tracking-widest.\nFloating CTA Button: Positioned bottom-8 right-8 z-50.\nButton text: \"JOIN THE [italicized: CLUB]\"\nOn desktop, if the menu is open, translate the button to the left using transform: translateX(calc(-1 * clamp(260px, 38vw, 420px))).\n5. Fleet Video Overlay Modal (isFleetOpen state)\nWhen opened, display a fixed flex container taking up the full screen (flex-col md:flex-row).\nThe Data: Use this exact JSON array:\ncode\nJSON\n[\n  {\n    \"src\": \"https://app-uploads.krea.ai/wan-videos/08006647-1c55-4823-b35d-e40d57c66bf8.mp4\",\n    \"title\": \"OCEAN\\nECLIPSE\",\n    \"specs\": [\n      { \"label\": \"LENGTH\", \"value\": \"28 M (92 FT)\" },\n      { \"label\": \"CRUISING SPEED\", \"value\": \"22 KNOTS\" },\n      { \"label\": \"GUESTS\", \"value\": \"UP TO 12 GUESTS\" },\n      { \"label\": \"CABINS\", \"value\": \"4 EN-SUITE CABINS\" },\n      { \"label\": \"SPECIAL FEATURE\", \"value\": \"ADVANCED GYRO STABILIZATION\" }\n    ]\n  },\n  {\n    \"src\": \"https://app-uploads.krea.ai/wan-videos/91fd9932-6194-4d58-ada0-955692853019.mp4\",\n    \"title\": \"BLACK\\nSOVEREIGN\",\n    \"specs\": [\n      { \"label\": \"LENGTH\", \"value\": \"24 M (78 FT)\" },\n      { \"label\": \"TOP SPEED\", \"value\": \"45 KNOTS\" },\n      { \"label\": \"HULL\", \"value\": \"CARBON FIBER & KEVLAR\" },\n      { \"label\": \"ENGINES\", \"value\": \"TWIN V12 2000 HP\" },\n      { \"label\": \"SPECIAL FEATURE\", \"value\": \"BESPOKE DESIGN WITH GOLD DETAILING\" }\n    ]\n  },\n  {\n    \"src\": \"https://app-uploads.krea.ai/wan-videos/95fb3282-d7cf-448e-9202-ef0662541c83.mp4\",\n    \"title\": \"AZURE\\nHORIZON\",\n    \"specs\": [\n      { \"label\": \"LENGTH\", \"value\": \"32 M (105 FT)\" },\n      { \"label\": \"RANGE\", \"value\": \"1,500 NAUTICAL MILES\" },\n      { \"label\": \"GUESTS\", \"value\": \"14 GUESTS + 5 CREW\" },\n      { \"label\": \"DECK\", \"value\": \"SPACIOUS SUN DECK WITH JACUZZI\" },\n      { \"label\": \"SPECIAL FEATURE\", \"value\": \"FULL WATER TOYS GARAGE\" }\n    ]\n  }\n]\nFleetVideo Component:\nEach column maps out a <video> taking up w-full h-[85vh] md:h-full md:flex-1. Include borders (border-r-2 border-white).\nAnimate columns coming in from the right (x: '100vw' to x: 0) using Framer Motion with delays staggering by i * 0.1 and a duration of 1.56.\nAdd onMouseEnter / onMouseLeave state to trigger video .play() and .pause() wrapped safely in a promise resolver to avoid interruptions.\nOn hover, scale the video up to 105% with duration-700.\nShow a black overlay (bg-black/20).\nHover Content: Inside <AnimatePresence>, render the title (e.g., text-5xl md:text-7xl mb-12), the mapped specs (uppercase tracking-widest text-white/70), and a \"VIEW\" button (bg-white/5 backdrop-blur-[120px]). Apply the specific y stagger text variants so they gracefully shift up from a clipped mask.\n6. The GSAP Custom Staggered Menu (StaggeredMenu.jsx)\nCreate an off-canvas navigation sidebar triggered from the right using GSAP.\nThe Wrapper & Icon: The hamburger icon consists of a div wrapper containing two spans forming a \"Plus\" shape. When open, GSAP controls it: rotate the wrapper by 225deg to form an X.\nSlot Machine Text Link: Next to the hamburger, display the text \"MENU\". When clicked, use a slot-machine-style vertical transition, cycling the words \"MENU\" and \"CLOSE\" three times before settling on the correct target word. Shift the interior wrapper yPercent: -finalShift rapidly over 0.5s easing power4 out.\nMenu Colors: Set the GSAP configuration to use colors ['#1a1a1a', '#93c5fd']. On open, the menu button's color changes automatically from #ffffff to #000000.\nThe Panel Animation:\nUtilize \"prelayers\", an array of div masking layers that slide in from 100vw. GSAP should .fromTo their xPercent to 0 using power4.out staggered by 0.07s.\nThe main panel follows right after taking 0.65 seconds.\nMenu Items: The menu items MUST contain: Home, Our Fleet (triggers setIsFleetOpen(true) and closes the menu), Membership, Regattas & Events, Academy, Contact. Animate their entrance using yPercent and a 10deg rotation rotating back to flat using .stagger: { each: 0.1 } mapped directly against the items NodeList.\nWrap the StaggeredMenu over the app context, providing the right position, colors, and social handles (Instagram, Facebook, Twitter).\nEnsure all component names, class names, file structures, and specific math equations are strictly ported to perfectly mimic the reference logic."}];

let currentTab='sites', currentFilter='all', searchQuery='';

const $content=document.getElementById('content');
const $search=document.getElementById('searchInput');
const $modal=document.getElementById('modalOverlay');
const $modalTitle=document.getElementById('modalTitle');
const $modalBody=document.getElementById('modalBody');
const $toast=document.getElementById('toast');

function showToast(msg){
  $toast.textContent=msg||'Copied!';
  $toast.classList.add('show');
  setTimeout(()=>$toast.classList.remove('show'),1800);
}

function copyText(text){
  if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>showToast());
  else{
    const ta=document.createElement('textarea');ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast();
  }
}

function closeModal(){$modal.classList.remove('show');}
document.getElementById('modalClose').onclick=closeModal;
$modal.onclick=(e)=>{if(e.target===$modal)closeModal();};

function openModal(title,bodyHtml){
  $modalTitle.textContent=title;
  $modalBody.innerHTML=bodyHtml;
  $modal.classList.add('show');
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function imgHtml(url,cls,aspect='16/10'){
  return `<div class="img-wrapper" style="aspect-ratio:${aspect}" data-src="${url}">
    <div class="skeleton-overlay skeleton skeleton-img"></div>
    <div class="error-icon">&#128302;</div>
    <img class="${cls}" src="${url}" loading="lazy" onload="this.parentElement.classList.add('loaded')" onerror="this.parentElement.classList.add('error')">
  </div>`;
}

function videoThumbHtml(url){
  return `<div class="img-wrapper" style="aspect-ratio:16/10" data-src="${url}">
    <div class="skeleton-overlay skeleton skeleton-img"></div>
    <div class="error-icon">&#127909;</div>
    <video class="card-thumb" src="${url}" muted preload="metadata" onloadeddata="this.parentElement.classList.add('loaded')" onerror="this.parentElement.classList.add('error')"></video>
  </div>`;
}

function filterItems(items){
  let f=items;
  if(currentFilter==='free') f=items.filter(i=>i._free);
  else if(currentFilter==='paid') f=items.filter(i=>!i._free);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    f=f.filter(i=>(i.title||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q));
  }
  return f;
}







function renderSites(){
  const items=filterItems(SITE_PROMPTS);
  if(!items.length) return '<div class="empty"><div class="empty-icon">&#127968;</div><div class="empty-text">No prompts</div></div>';
  let html='<div class="grid">';
  items.forEach(p=>{
    const badge=p._free?'<span class="card-badge free">FREE</span>':'<span class="card-badge paid">PRO</span>';
    let thumb;
    if(p.thumb){
      thumb=imgHtml(p.thumb,'card-thumb');
    } else {
      thumb=`<div class="card-thumb" style="background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;align-items:center;justify-content:center;padding:12px;text-align:center">
        <span style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);line-height:1.3">${esc(p.title)}</span>
      </div>`;
    }
    html+=`<div class="card" onclick="openSitePrompt('${p.id}')">${thumb}${badge}<div class="card-body"><div class="card-title">${esc(p.title)}</div><div class="card-cat">${esc(p.category)} &middot; ${p.type}</div></div></div>`;
  });
  return html+'</div>';
}

function renderBackgrounds(){
  const items=filterItems(BACKGROUNDS);
  if(!items.length) return '<div class="empty"><div class="empty-icon">&#127912;</div><div class="empty-text">No backgrounds</div></div>';
  let html='<div class="grid">';
  items.forEach(b=>{
    const badge=b._free?'<span class="card-badge free">FREE</span>':'<span class="card-badge prem">PRO</span>';
    const src=b.source==='designrocket'?'DR':'MS';
    html+=`<div class="card" onclick="openBackground('${b.id}')">${imgHtml(b.thumb,'card-thumb-bg','16/9')}${badge}<div class="card-body"><div class="card-title">${esc(b.title)}</div><div class="card-source">${src}</div></div></div>`;
  });
  return html+'</div>';
}

function renderTemplates(){
  const items=filterItems(TEMPLATES);
  if(!items.length) return '<div class="empty"><div class="empty-icon">&#128196;</div><div class="empty-text">No templates</div></div>';
  let html='<div class="grid">';
  items.forEach(t=>{
    const badge=t._free?'<span class="card-badge free">FREE</span>':'<span class="card-badge prem">PRO</span>';
    const src=t.source==='premium'?'DR':'LV';
    html+=`<div class="card" onclick="openTemplate('${t.id}')">${imgHtml(t.image,'card-thumb')}${badge}<div class="card-body"><div class="card-title">${esc(t.title)}</div><div class="card-source">${src}</div></div></div>`;
  });
  return html+'</div>';
}

function renderCourses(){
  let allItems=[];
  LESSONS.forEach(l=>allItems.push({...l,_type:'lesson'}));
  TUTORIALS.forEach(t=>allItems.push({...t,_type:'tutorial'}));
  const items=filterItems(allItems);
  if(!items.length) return '<div class="empty"><div class="empty-icon">&#128218;</div><div class="empty-text">No courses</div></div>';
  const tutItems=items.filter(i=>i._type==='tutorial');
  const lesItems=items.filter(i=>i._type==='lesson');
  let html='';
  if(tutItems.length){
    html+='<div class="section-title">Exclusive Tutorials</div><div class="grid">';
    tutItems.forEach(t=>{
      html+=`<div class="card" onclick="openTutorial('${t.id}')">${imgHtml(t.thumb,'card-thumb')}<span class="card-badge prem">PRO</span><div class="card-body"><div class="card-title">${esc(t.title)}</div></div></div>`;
    });
    html+='</div>';
  }
  if(lesItems.length){
    html+='<div class="section-title">Training Lessons</div>';
    lesItems.forEach(l=>{
      const badge=l._free?'<span class="list-item-badge" style="background:rgba(74,222,128,.2);color:var(--green)">FREE</span>':'<span class="list-item-badge" style="background:rgba(248,113,113,.15);color:var(--red)">PRO</span>';
      html+=`<div class="list-item" onclick="openLesson('${l.id}')"><div class="img-wrapper" style="width:64px;height:40px;border-radius:8px;overflow:hidden"><div class="skeleton-overlay skeleton" style="position:absolute;inset:0"></div><img class="list-item-thumb" src="${l.thumb}" loading="lazy" onload="this.parentElement.classList.add('loaded')" onerror="this.parentElement.classList.add('error')"></div><div class="list-item-body"><div class="list-item-title">${esc(l.title)}</div><div class="list-item-sub">Lesson</div></div>${badge}</div>`;
    });
  }
  return html;
}

window.openSitePrompt=function(id){
  const p=SITE_PROMPTS.find(x=>x.id===id);
  if(!p) return;
  const badge=p._free?'<span class="tag" style="color:var(--green)">FREE</span>':'<span class="tag" style="color:var(--accent2)">PREMIUM</span>';
  let body='';
  if(p.thumb) body+=imgHtml(p.thumb,'','16/10').replace('aspect-ratio:16/10','border-radius:var(--radius2);overflow:hidden;margin-bottom:12px');
  else if(p.videoUrl) body+=`<div class="img-wrapper" style="border-radius:var(--radius2);overflow:hidden;margin-bottom:12px"><div class="skeleton-overlay skeleton" style="position:absolute;inset:0"></div><video style="width:100%;display:block" src="${p.videoUrl}" muted controls preload="metadata" onloadeddata="this.parentElement.classList.add('loaded')"></video></div>`;
  body+=`<div class="modal-meta">${badge}<span class="tag">${esc(p.category)}</span><span class="tag">${p.type}</span></div>`;
  body+=`<div class="modal-prompt" id="promptText">${esc(p.prompt)}</div>`;
  body+=`<button class="btn-copy primary" onclick="copyText(document.getElementById('promptText').textContent)">Copy Prompt</button>`;
  if(p.videoUrl) body+=`<button class="btn-copy secondary" style="margin-top:6px" onclick="copyText('${p.videoUrl}')">Copy Video URL</button>`;
  openModal(p.title,body);
};

window.openBackground=function(id){
  const b=BACKGROUNDS.find(x=>x.id===id);
  if(!b) return;
  const badge=b._free?'<span class="tag" style="color:var(--green)">FREE</span>':'<span class="tag" style="color:var(--red)">PREMIUM</span>';
  let body=imgHtml(b.thumb,'','16/9').replace('aspect-ratio:16/9','border-radius:var(--radius2);overflow:hidden;margin-bottom:12px');
  body+=`<div class="img-wrapper" style="border-radius:var(--radius2);overflow:hidden;margin-bottom:12px"><div class="skeleton-overlay skeleton" style="position:absolute;inset:0"></div><video style="width:100%;display:block" src="${b.videoUrl}" muted controls loop preload="metadata" onloadeddata="this.parentElement.classList.add('loaded')"></video></div>`;
  body+=`<div class="modal-meta">${badge}<span class="tag">${b.source==='designrocket'?'DesignRocket':'MotionSites'}</span></div>`;
  body+=`<button class="btn-copy primary" onclick="copyText('${b.videoUrl}')">Copy Video URL</button>`;
  openModal(b.title,body);
};

window.openTemplate=function(id){
  const t=TEMPLATES.find(x=>x.id===id);
  if(!t) return;
  const badge=t._free?'<span class="tag" style="color:var(--green)">FREE</span>':'<span class="tag" style="color:var(--red)">PREMIUM</span>';
  let body=imgHtml(t.image,'').replace('aspect-ratio:16/10','border-radius:var(--radius2);overflow:hidden;margin-bottom:12px');
  body+=`<div class="modal-meta">${badge}<span class="tag">${t.source==='premium'?'DesignRocket':'Lovable'}</span></div>`;
  let btns='<div class="btn-row">';
  if(t.remixLink) btns+=`<button class="btn-copy primary" onclick="window.open('${t.remixLink}','_blank')">Open Remix</button>`;
  if(t.previewLink) btns+=`<button class="btn-copy primary" onclick="window.open('${t.previewLink}','_blank')">Preview</button>`;
  btns+='</div><div class="btn-row" style="margin-top:6px">';
  if(t.github) btns+=`<button class="btn-copy secondary" onclick="window.open('${t.github}','_blank')">GitHub</button>`;
  if(t.bolt) btns+=`<button class="btn-copy secondary" onclick="window.open('${t.bolt}','_blank')">Bolt.new</button>`;
  btns+='</div>';
  body+=btns;
  openModal(t.title,body);
};

window.openLesson=function(id){
  const l=LESSONS.find(x=>x.id===id);
  if(!l) return;
  const badge=l._free?'<span class="tag" style="color:var(--green)">FREE</span>':'<span class="tag" style="color:var(--red)">PREMIUM</span>';
  let body='';
  if(l.thumb) body+=imgHtml(l.thumb,'').replace('aspect-ratio:16/10','border-radius:var(--radius2);overflow:hidden;margin-bottom:12px');
  body+=`<div class="modal-meta">${badge}</div>`;
  if(l.loomUrl) body+=`<button class="btn-copy primary" onclick="window.open('${l.loomUrl}','_blank')">Watch on Loom</button>`;
  if(l.remixLink) body+=`<button class="btn-copy secondary" style="margin-top:6px" onclick="window.open('${l.remixLink}','_blank')">Open Remix</button>`;
  openModal(l.title,body);
};

window.openTutorial=function(id){
  const t=TUTORIALS.find(x=>x.id===id);
  if(!t) return;
  let body='';
  if(t.thumb) body+=imgHtml(t.thumb,'').replace('aspect-ratio:16/10','border-radius:var(--radius2);overflow:hidden;margin-bottom:12px');
  body+='<span class="tag" style="color:var(--red)">EXCLUSIVE</span><br>';
  if(t.videoUrl) body+=`<button class="btn-copy primary" onclick="window.open('${t.videoUrl}','_blank')">Watch Tutorial</button>`;
  if(t.sourceLink) body+=`<button class="btn-copy secondary" style="margin-top:6px" onclick="window.open('${t.sourceLink}','_blank')">Source</button>`;
  openModal(t.title,body);
};

function render(){
  let html='';
  switch(currentTab){
    case 'sites': html=renderSites(); break;
    case 'backgrounds': html=renderBackgrounds(); break;
    case 'templates': html=renderTemplates(); break;
    case 'courses': html=renderCourses(); break;
  }
  $content.innerHTML=html;
}

function updateStats(){
  const total=SITE_PROMPTS.length+BACKGROUNDS.length+TEMPLATES.length;
  document.getElementById('statsPill').textContent=`${total} items`;
  document.getElementById('sitesBadge').textContent=SITE_PROMPTS.length;
  document.getElementById('bgsBadge').textContent=BACKGROUNDS.length;
  document.getElementById('tplsBadge').textContent=TEMPLATES.length;
  document.getElementById('coursesBadge').textContent=LESSONS.length+TUTORIALS.length;
  const allChip=document.querySelector('[data-filter="all"] .cnt');
  const freeChip=document.querySelector('[data-filter="free"] .cnt');
  const paidChip=document.querySelector('[data-filter="paid"] .cnt');
  let totalC,freeC,paidC;
  switch(currentTab){
    case 'sites': totalC=SITE_PROMPTS.length; freeC=SITE_PROMPTS.filter(p=>p._free).length; break;
    case 'backgrounds': totalC=BACKGROUNDS.length; freeC=BACKGROUNDS.filter(b=>b._free).length; break;
    case 'templates': totalC=TEMPLATES.length; freeC=TEMPLATES.filter(t=>t._free).length; break;
    case 'courses': totalC=LESSONS.length+TUTORIALS.length; freeC=LESSONS.filter(l=>l._free).length+TUTORIALS.filter(t=>t._free).length; break;
  }
  paidC=totalC-freeC;
  allChip.textContent=totalC; freeChip.textContent=freeC; paidChip.textContent=paidC;
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTab=tab.dataset.tab;
    currentFilter='all';
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    document.querySelector('[data-filter="all"]').classList.add('active');
updateStats(); render();
  };
});

document.querySelectorAll('.chip').forEach(chip=>{
  chip.onclick=()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter=chip.dataset.filter;
    render();
  };
});

$search.oninput=()=>{searchQuery=$search.value.trim();render();};



if(window.Telegram&&window.Telegram.WebApp){window.Telegram.WebApp.ready();window.Telegram.WebApp.expand();}

updateStats(); render(); 
setTimeout(()=>{const l=document.getElementById('loader');if(l)l.style.display='none'},100);
function initIcons(){
  if(typeof lucide!=='undefined'){lucide.createIcons();}
  else{setTimeout(initIcons,100);}
}
initIcons();
</script>
</body>
</html>
